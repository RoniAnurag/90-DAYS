<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rise Up 90 • Money Dashboard</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                        display: ['SF Pro Display', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    },
                    colors: {
                        brand: { 500: '#ff3b30', 600: '#d70015' }, // Apple red-like for accents
                        gold: { 400: '#ffd60a', 500: '#ff9f0a' }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.2);
            --text-main: #f5f5f7;
            --text-muted: #86868b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 59, 48, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255, 214, 10, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Apple-style Water Glass Effect */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 
                0 4px 24px -1px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            border-color: var(--glass-highlight);
            box-shadow: 
                0 8px 32px -1px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.2);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }
        
        .glass-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(255, 59, 48, 0.15);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .glass-button:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.05);
        }

        .glass-button.active {
            background: var(--text-main);
            color: black;
            border-color: transparent;
        }

        /* Typography */
        h1, h2, h3, h4 {
            font-family: 'SF Pro Display', sans-serif;
            letter-spacing: -0.02em;
        }

        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .text-gradient-brand {
            background: linear-gradient(135deg, #ff3b30 0%, #ff9f0a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Utilities */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Subtle grid background */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            pointer-events: none;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const BONANZA_TIERS = [
            { id: 1, name: "Vietnam Trip", allotments: 2, revReq: 0, revText: "-", prize: "Vietnam Trip (Oct 2nd Wk)" },
            { id: 2, name: "Gold + Vietnam", allotments: 3, revReq: 5000000, revText: "50L", prize: "8g Gold + Vietnam" },
            { id: 3, name: "China + iPhone", allotments: 5, revReq: 10000000, revText: "1Cr", prize: "China + iPhone 17 Pro Max" },
            { id: 4, name: "Car Down Payment", allotments: 10, revReq: 15000000, revText: "1.5Cr", prize: "China + 4.5L Car DP" },
            { id: 5, name: "House + Car", allotments: 15, revReq: 20000000, revText: "2Cr", prize: "China + 14L House + 4L Car DP" },
            { id: 6, name: "Ultimate Bonanza", allotments: 20, revReq: 25000000, revText: "2.5Cr", prize: "China + 24L House + 5L Car DP" },
        ];

        const PROJECTS = [
            { id: 'p1', region: 'Shadnagar', category: 'Premium', name: "Golden Heights Health Village", location: "Balanagar", price: "₹19,999", tags: ["MUDA", "75 Acres"] },
            { id: 'p2', region: 'Shadnagar', category: 'Standard', name: "Iconic 2, 3, 4, 5", location: "Shadnagar", price: "₹18,399", tags: ["HMDA/DTCP"] },
            { id: 'p3', region: 'Shadnagar', category: 'Budget', name: "Spring City", location: "Shadnagar", price: "₹10,599", tags: ["HMDA/DTCP"] },
            { id: 'p4', region: 'Shadnagar', category: 'Standard', name: "Paradise 2", location: "Shadnagar", price: "₹17,399", tags: ["HMDA/DTCP"] },
            { id: 'p5', region: 'Shadnagar', category: 'Premium', name: "Iconic 6 & 7", location: "Bengaluru Hwy", price: "₹24,999", tags: ["Highway Facing"] },
            { id: 'p10', region: 'Mumbai', category: 'Mega', name: "Golden Heights Smart County", location: "Budhera", price: "₹10,499", tags: ["DTCP", "65 Acres"] },
            { id: 'p12', region: 'Warangal', category: 'Standard', name: "RK Enclave", location: "Ghatkesar", price: "₹18,899", tags: ["HMDA"] },
            { id: 'p15', region: 'Vijayawada', category: 'Premium', name: "Prakriti Hill Township", location: "Piglipur", price: "₹22,999", tags: ["Residential"] },
        ];

        const FILTER_TABS = [
            { label: "All", value: "All" },
            { label: "Shadnagar", value: "Shadnagar" },
            { label: "Mumbai", value: "Mumbai" },
            { label: "Warangal", value: "Warangal" },
            { label: "Vijayawada", value: "Vijayawada" },
        ];

        const formatINR = (number) => {
            return new Intl.NumberFormat('en-IN', {
                style: 'currency',
                currency: 'INR',
                maximumFractionDigits: 0
            }).format(number);
        };

        const App = () => {
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
            const [allotments, setAllotments] = useState(0);
            const [revenueInput, setRevenueInput] = useState("");
            const [activeFilter, setActiveFilter] = useState("All");
            const [entered, setEntered] = useState(false);
            
            const revenue = parseFloat(revenueInput.replace(/,/g, '')) || 0;
            const commission = revenue * 0.19;
            const filteredProjects = activeFilter === "All" ? PROJECTS : PROJECTS.filter(p => p.region === activeFilter);

            useEffect(() => {
                const targetDate = new Date("September 30, 2026 23:59:59").getTime();
                const interval = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = targetDate - now;
                    if (distance < 0) {
                        clearInterval(interval);
                        setTimeLeft({ days: 0, hours: 0, minutes: 0, seconds: 0 });
                    } else {
                        setTimeLeft({
                            days: Math.floor(distance / (1000 * 60 * 60 * 24)),
                            hours: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                            minutes: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                            seconds: Math.floor((distance % (1000 * 60)) / 1000)
                        });
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            const getCurrentTier = () => {
                let highest = null;
                for (let i = 0; i < BONANZA_TIERS.length; i++) {
                    const tier = BONANZA_TIERS[i];
                    if (allotments >= tier.allotments && revenue >= tier.revReq) {
                        highest = tier;
                    }
                }
                return highest;
            };
            const getNextTier = () => {
                const current = getCurrentTier();
                if (!current) return BONANZA_TIERS[0];
                const currentIndex = BONANZA_TIERS.findIndex(t => t.id === current.id);
                return BONANZA_TIERS[currentIndex + 1] || null;
            };
            const currentTier = getCurrentTier();
            const nextTier = getNextTier();

            const handleRevenueChange = (e) => {
                const val = e.target.value.replace(/[^0-9]/g, '');
                setRevenueInput(val);
            };
            const addRevenue = (amount) => {
                setRevenueInput((revenue + amount).toString());
            };

            if (!entered) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 relative">
                        <div className="bg-grid"></div>
                        <div className="glass-panel p-10 md:p-16 rounded-[2rem] max-w-lg w-full text-center flex flex-col items-center animate-float">
                            <div className="w-20 h-20 bg-brand-500/20 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(255,59,48,0.3)]">
                                <i className="fa-solid fa-arrow-trend-up text-3xl text-brand-500"></i>
                            </div>
                            <h1 className="text-4xl md:text-5xl font-semibold mb-2 text-gradient">Rise Up 90</h1>
                            <p className="text-[var(--text-muted)] text-sm uppercase tracking-widest font-medium mb-10">Ignite The Hustle</p>
                            
                            <button 
                                onClick={() => setEntered(true)} 
                                className="w-full bg-white text-black font-semibold py-4 px-8 rounded-full text-lg hover:bg-gray-200 transition-colors shadow-lg flex items-center justify-center gap-2"
                            >
                                Enter Dashboard <i className="fa-solid fa-arrow-right text-sm"></i>
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-8 relative max-w-6xl mx-auto">
                    <div className="bg-grid"></div>

                    {/* Header Section */}
                    <header className="flex flex-col md:flex-row justify-between items-center mb-8 gap-6 mt-4">
                        <div>
                            <h1 className="text-3xl md:text-4xl font-bold text-gradient-brand">Rise Up 90</h1>
                            <p className="text-[var(--text-muted)] text-xs uppercase tracking-widest font-medium mt-1">90 Days to Dominate</p>
                        </div>

                        {/* Timer Glass Panel */}
                        <div className="glass-panel px-6 py-3 flex gap-4 md:gap-8 items-center">
                            {[
                                { label: 'Days', value: timeLeft.days },
                                { label: 'Hours', value: timeLeft.hours },
                                { label: 'Mins', value: timeLeft.minutes },
                                { label: 'Secs', value: timeLeft.seconds }
                            ].map((time, idx) => (
                                <div key={idx} className="flex flex-col items-center">
                                    <span className="font-display text-2xl md:text-3xl font-medium tracking-tight text-white">
                                        {time.value.toString().padStart(2, '0')}
                                    </span>
                                    <span className="text-[10px] text-[var(--text-muted)] uppercase font-semibold tracking-wider">{time.label}</span>
                                </div>
                            ))}
                        </div>
                    </header>

                    {}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-6">
                        
                        {/* Left Column: Progress & Commission */}
                        <div className="lg:col-span-5 flex flex-col gap-6">
                            
                            {/* Commission Card */}
                            <div className="glass-panel p-6 relative overflow-hidden group">
                                <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                                    <i className="fa-solid fa-wallet text-6xl text-green-400"></i>
                                </div>
                                <h3 className="text-[var(--text-muted)] text-xs font-semibold uppercase tracking-wider mb-2">Estimated 19% Commission</h3>
                                <div className="font-display text-4xl md:text-5xl font-semibold text-green-400">
                                    {formatINR(commission)}
                                </div>
                            </div>

                            {/* Log Progress Card */}
                            <div className="glass-panel p-6">
                                <div className="flex items-center gap-2 mb-6">
                                    <div className="w-8 h-8 rounded-full bg-brand-500/20 flex items-center justify-center">
                                        <i className="fa-solid fa-pen text-brand-500 text-sm"></i>
                                    </div>
                                    <h2 className="text-xl font-semibold text-white">Log Progress</h2>
                                </div>

                                <div className="space-y-5">
                                    {/* Allotments Input */}
                                    <div>
                                        <label className="block text-[var(--text-muted)] text-xs font-medium mb-2 uppercase tracking-wide">Total Allotments</label>
                                        <div className="flex h-12">
                                            <button onClick={() => setAllotments(Math.max(0, allotments - 1))} className="glass-button w-12 flex items-center justify-center rounded-r-none border-r-0 text-xl">−</button>
                                            <input 
                                                type="number" 
                                                value={allotments} 
                                                onChange={(e) => setAllotments(parseInt(e.target.value) || 0)} 
                                                className="glass-input flex-1 rounded-none text-center text-xl font-medium" 
                                            />
                                            <button onClick={() => setAllotments(allotments + 1)} className="glass-button w-12 flex items-center justify-center rounded-l-none border-l-0 text-xl">+</button>
                                        </div>
                                    </div>

                                    {/* Revenue Input */}
                                    <div>
                                        <div className="flex justify-between items-end mb-2">
                                            <label className="block text-[var(--text-muted)] text-xs font-medium uppercase tracking-wide">Total Revenue (₹)</label>
                                            <span className="text-xs font-medium text-white">{formatINR(revenue)}</span>
                                        </div>
                                        <input 
                                            type="text" 
                                            value={revenueInput} 
                                            onChange={handleRevenueChange} 
                                            placeholder="e.g. 5000000" 
                                            className="glass-input w-full h-12 px-4 text-lg font-medium mb-3" 
                                        />
                                        
                                        {/* Quick Add Buttons */}
                                        <div className="grid grid-cols-4 gap-2">
                                            <button onClick={() => addRevenue(100000)} className="glass-button py-2 text-xs font-medium text-gray-300">+1L</button>
                                            <button onClick={() => addRevenue(500000)} className="glass-button py-2 text-xs font-medium text-gray-300">+5L</button>
                                            <button onClick={() => addRevenue(1000000)} className="glass-button py-2 text-xs font-medium text-brand-500">+10L</button>
                                            <button onClick={() => setRevenueInput("")} className="glass-button py-2 text-xs font-medium text-[var(--text-muted)]">Reset</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {}
                        <div className="lg:col-span-7">
                            <div className="glass-panel p-6 h-full flex flex-col">
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex items-center gap-2">
                                        <div className="w-8 h-8 rounded-full bg-gold-500/20 flex items-center justify-center">
                                            <i className="fa-solid fa-trophy text-gold-500 text-sm"></i>
                                        </div>
                                        <h2 className="text-xl font-semibold text-white">Bonanza Rewards</h2>
                                    </div>
                                </div>

                                {/* Current Status Area */}
                                <div className="mb-6 p-4 rounded-2xl bg-white/5 border border-white/10">
                                    {currentTier ? (
                                        <div className="text-center">
                                            <span className="inline-block px-2 py-1 bg-green-500/20 text-green-400 text-[10px] font-bold uppercase rounded mb-2">Unlocked</span>
                                            <h3 className="text-2xl font-bold text-white">{currentTier.prize}</h3>
                                        </div>
                                    ) : (
                                        <div className="text-center">
                                            <span className="text-[var(--text-muted)] text-sm font-medium">Keep pushing. No rewards unlocked yet.</span>
                                        </div>
                                    )}
                                </div>

                                {/* Next Target Area */}
                                {nextTier && (
                                    <div className="mb-6">
                                        <h4 className="text-[var(--text-muted)] text-xs font-semibold uppercase tracking-wider mb-3">Next Target</h4>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-black/30 rounded-xl p-3 border border-white/5">
                                                <div className="text-[10px] text-[var(--text-muted)] uppercase mb-1">Allotments</div>
                                                <div className="flex items-end justify-between">
                                                    <span className={`text-xl font-semibold ${allotments >= nextTier.allotments ? 'text-green-400' : 'text-white'}`}>{allotments} <span className="text-sm text-gray-500">/ {nextTier.allotments}</span></span>
                                                    {allotments >= nextTier.allotments && <i className="fa-solid fa-check-circle text-green-400"></i>}
                                                </div>
                                            </div>
                                            <div className="bg-black/30 rounded-xl p-3 border border-white/5">
                                                <div className="text-[10px] text-[var(--text-muted)] uppercase mb-1">Revenue</div>
                                                <div className="flex items-end justify-between">
                                                    <span className={`text-xl font-semibold ${revenue >= nextTier.revReq ? 'text-green-400' : 'text-white'}`}>{revenue >= nextTier.revReq ? "Ready" : nextTier.revText || "-"}</span>
                                                    {revenue >= nextTier.revReq && <i className="fa-solid fa-check-circle text-green-400"></i>}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Reward Tiers List */}
                                <div className="space-y-3 overflow-y-auto pr-2 flex-1 min-h-[200px]">
                                    {BONANZA_TIERS.map((tier) => {
                                        const isUnlocked = currentTier && tier.id <= currentTier.id;
                                        const isNext = nextTier && tier.id === nextTier.id;
                                        
                                        let styleClasses = "bg-white/5 border-transparent text-[var(--text-muted)] opacity-60";
                                        let icon = <i className="fa-solid fa-lock text-xs"></i>;
                                        
                                        if (isUnlocked) { 
                                            styleClasses = "bg-green-500/10 border-green-500/20 text-white opacity-100"; 
                                            icon = <i className="fa-solid fa-check text-green-400 text-xs"></i>; 
                                        } else if (isNext) { 
                                            styleClasses = "bg-brand-500/10 border-brand-500/30 text-white opacity-100"; 
                                            icon = <div className="w-2 h-2 rounded-full bg-brand-500 animate-pulse"></div>; 
                                        }

                                        return (
                                            <div key={tier.id} className={`flex items-center gap-4 p-3 rounded-xl border ${styleClasses} transition-all duration-300`}>
                                                <div className="w-6 flex justify-center">{icon}</div>
                                                <div className="flex-1">
                                                    <div className="font-medium text-sm">{tier.prize}</div>
                                                </div>
                                                <div className="text-right">
                                                    <div className="text-[10px] font-medium">{tier.allotments} Allot.</div>
                                                    <div className="text-[10px] opacity-70">{tier.revReq > 0 ? tier.revText : 'Base'}</div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>

                    {}
                    <div className="glass-panel p-6">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center">
                                    <i className="fa-solid fa-map text-blue-500 text-sm"></i>
                                </div>
                                <h2 className="text-xl font-semibold text-white">Project Catalog</h2>
                            </div>
                            
                            {/* Filter Pills */}
                            <div className="flex overflow-x-auto hide-scrollbar gap-2 pb-2 w-full md:w-auto -mx-2 px-2 md:mx-0 md:px-0">
                                {FILTER_TABS.map(tab => (
                                    <button 
                                        key={tab.value} 
                                        onClick={() => setActiveFilter(tab.value)} 
                                        className={`px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition-colors ${
                                            activeFilter === tab.value 
                                            ? 'bg-white text-black' 
                                            : 'glass-button text-[var(--text-muted)]'
                                        }`}
                                    >
                                        {tab.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Projects Grid */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                            {filteredProjects.map(proj => (
                                <div key={proj.id} className="bg-white/5 border border-white/10 rounded-2xl p-4 hover:bg-white/10 transition-colors group cursor-default">
                                    <div className="flex justify-between items-start mb-2">
                                        <span className="text-[10px] font-medium uppercase tracking-wider text-[var(--text-muted)]">{proj.category}</span>
                                        <div className="flex gap-1">
                                            {proj.tags.map((tag, i) => (
                                                <span key={i} className="bg-black/50 text-gray-300 text-[9px] px-1.5 py-0.5 rounded">{tag}</span>
                                            ))}
                                        </div>
                                    </div>
                                    <h4 className="font-semibold text-white text-lg leading-tight mb-1 group-hover:text-brand-500 transition-colors">{proj.name}</h4>
                                    <p className="text-[var(--text-muted)] text-xs mb-4 flex items-center gap-1">
                                        <i className="fa-solid fa-location-dot"></i> {proj.location}
                                    </p>
                                    <div className="pt-3 border-t border-white/10 flex justify-between items-end">
                                        <span className="text-xs text-[var(--text-muted)]">Starting at</span>
                                        <span className="font-medium text-white">{proj.price}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    <div className="text-center mt-12 pb-8 opacity-50">
                        <i className="fa-brands fa-apple text-xl"></i>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

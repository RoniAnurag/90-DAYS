<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin>
    </script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin>
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js">
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Oswald', 'sans-serif'] },
                    colors: {
                        fire: { 500: '#ff4e00', 600: '#e33c00', 700: '#c42b00', 800: '#a12200', 900: '#7a1900' },
                        gold: { 400: '#ffd700', 500: '#f5c518' },
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.2s cubic-bezier(0.4,0,0.6,1) infinite',
                        'float': 'float 4s ease-in-out infinite',
                        'glow-pulse': 'glowPulse 2s ease-in-out infinite',
                        'fire-rise': 'fireRise 2s ease-out infinite',
                        'shimmer': 'shimmer 4s linear infinite',
                    },
                    keyframes: {
                        float: { '0%,100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-16px)' } },
                        glowPulse: { '0%,100%': { boxShadow: '0 0 20px rgba(255,78,0,0.15)' }, '50%': { boxShadow: '0 0 50px rgba(255,78,0,0.4)' } },
                        fireRise: { '0%': { transform: 'scale(0.6) translateY(20px)', opacity: '0' }, '50%': { opacity: '1' }, '100%': { transform: 'scale(1.4) translateY(-50px)', opacity: '0' } },
                        shimmer: { '0%': { backgroundPosition: '-200% center' }, '100%': { backgroundPosition: '200% center' } },
                    }
                }
            }
        }
    </script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            min-height: 100vh;
            overflow-x: hidden;
            background: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-image: radial-gradient(ellipse at 50% 0%, #1f0a00 0%, #050505 70%);
            background-attachment: fixed;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }
        ::-webkit-scrollbar-track {
            background: #111;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff4e00;
            border-radius: 6px;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Text gradient */
        .text-gradient {
            background: linear-gradient(135deg, #ff4e00, #f5c518, #ff4e00);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }

        /* Glass cards */
        .card-glass {
            background: rgba(12, 12, 12, 0.82);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 78, 0, 0.10);
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .card-glass:hover {
            border-color: rgba(255, 78, 0, 0.25);
        }

        /* Fire particles */
        #fire-particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            background: radial-gradient(circle, #ff8a00, #ff4e00);
            border-radius: 50%;
            opacity: 0;
            filter: blur(1px);
            animation: fireRise 2.8s ease-out infinite;
        }
        @media (max-width: 480px) {
            .particle {
                width: 4px !important;
                height: 4px !important;
            }
        }

        /* Floating emojis */
        .float-emoji {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            animation: float 7s ease-in-out infinite;
            user-select: none;
            opacity: 0.08;
            font-size: 1.4rem;
        }
        @media (max-width: 480px) {
            .float-emoji {
                font-size: 0.9rem;
                opacity: 0.05;
            }
        }
        @media (min-width: 768px) {
            .float-emoji {
                font-size: 2.2rem;
                opacity: 0.10;
            }
        }

        /* Glow rings */
        .glow-ring {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 78, 0, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Timer digits */
        .timer-digit {
            font-family: 'Oswald', sans-serif;
            text-shadow: 0 0 30px rgba(255, 78, 0, 0.20);
        }

        /* Commission pulse */
        .commission-pulse {
            animation: glowPulse 2.5s ease-in-out infinite;
        }

        /* Card enter animation */
        .card-enter {
            animation: cardFadeUp 0.5s ease-out forwards;
            opacity: 0;
        }
        @keyframes cardFadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card-enter:nth-child(1) {
            animation-delay: 0.04s;
        }
        .card-enter:nth-child(2) {
            animation-delay: 0.08s;
        }
        .card-enter:nth-child(3) {
            animation-delay: 0.12s;
        }
        .card-enter:nth-child(4) {
            animation-delay: 0.16s;
        }
        .card-enter:nth-child(5) {
            animation-delay: 0.20s;
        }
        .card-enter:nth-child(6) {
            animation-delay: 0.24s;
        }

        /* Entrance overlay */
        #entrance-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
            background-image: radial-gradient(ellipse at 50% 30%, #1f0a00 0%, #050505 70%);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #entrance-overlay.hidden {
            opacity: 0;
            transform: scale(1.04);
            pointer-events: none;
        }

        /* Touch optimizations */
        .touch-manipulation {
            touch-action: manipulation;
        }
        button,
        .clickable {
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        button:active,
        .clickable:active {
            transform: scale(0.96);
        }

        /* Project card */
        .project-name {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Confetti */
        .confetti-piece {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            pointer-events: none;
            z-index: 100;
            animation: confettiFall 1.8s ease-out forwards;
        }
        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(120px) rotate(720deg) scale(0.2);
            }
        }

        /* Audio hint pulse */
        .audio-hint {
            animation: pulse 2s ease-in-out infinite;
        }

        /* Audio status indicator */
        .audio-status {
            transition: all 0.3s ease;
        }

        /* Fix for number input spinners on mobile */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* Better touch targets on mobile */
        @media (max-width: 480px) {
            button,
            .clickable {
                min-height: 44px;
                min-width: 44px;
            }
            .timer-digit {
                font-size: 1.5rem !important;
            }
        }

        /* Ensure no horizontal scroll */
        .no-scroll-x {
            overflow-x: hidden;
            max-width: 100vw;
        }
    </style>
</head>
<body>

    <!-- ====== FLOATING EMOJIS ====== -->
    <div class="float-emoji" style="top:6%;left:4%;animation-delay:0s;">🔥</div>
    <div class="float-emoji" style="top:12%;right:6%;animation-delay:1.2s;">⚡</div>

    <!-- ====== GLOW RINGS ====== -->
    <div class="glow-ring" style="width:70vw;height:70vw;top:-25%;right:-25%;"></div>
    <div class="glow-ring" style="width:55vw;height:55vw;bottom:-20%;left:-20%;"></div>

    <!-- ====== ROOT ====== -->
    <div id="root"></div>

    <!-- ====== REACT ====== -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // ——— DATA ———
        const BONANZA_TIERS = [
            { id: 1, name: "Vietnam Trip", allotments: 2, revReq: 0, revText: "-", prize: "Vietnam Trip (Oct 2nd Wk)" },
            { id: 2, name: "Gold + Vietnam", allotments: 3, revReq: 5000000, revText: "50 Lakhs",
            prize: "8g Gold + Vietnam" },

            prize: "China + 24L House + 5L Car DP" },
        ];

        const PROJECTS = [
            { id: 'p1', region: 'Shadnagar', category: 'Premium / Wellness', name: "Golden Heights Health Village",
                location: "Balanagar", price: "₹19,999", sizes: "150-400 Sq.Yd",
            tags: ["MUDA", "75 Acres", "51+ Amenities"] },
            { id: 'p2', region: 'Shadnagar', category: 'Standard', name: "Iconic 2, 3, 4, 5", location: "Shadnagar",
                price: "₹18,399", sizes: "Var.", tags: ["HMDA/DTCP"] },
            { id: 'p3', region: 'Shadnagar', category: 'Budget', name: "Spring City", location: "Shadnagar",
                price: "₹10,599", sizes: "Var.", tags: ["HMDA/DTCP"] },
            { id: 'p4', region: 'Shadnagar', category: 'Standard', name: "Paradise 2", location: "Shadnagar",
                price: "₹17,399", sizes: "Var.", tags: ["HMDA/DTCP"] },
            { id: 'p5', region: 'Shadnagar', category: 'Premium', name: "Iconic 6 & 7", location: "Bengaluru Hwy",

            { id: 'p7', region: 'Shadnagar', category: 'Premium Farm', name: "Dream Valley 2", location: "Kamsanpally",
                price: "₹10.16L", sizes: "Per Gunta", tags: ["Resort Mem.", "Farm Plots"] },
            { id: 'p8', region: 'Shadnagar', category: 'Premium Farm', name: "Dream Valley 3", location: "Nagulapally",
                price: "₹15.48L", sizes: "Per Gunta", tags: ["Resort Mem.", "Farm Plots"] },
            { id: 'p9', region: 'Shadnagar', category: 'Value', name: "Golden Heights @ Rajapur", location: "Rajapur (NH44)",
                price: "Contact", sizes: "Var.", tags: ["MUDA", "Spot Reg."] },
            { id: 'p10', region: 'Mumbai', category: 'Mega Project', name: "Golden Heights Smart County",
                location: "Budhera, Patloor", price: "₹10,499", sizes: "Var.", tags: ["DTCP", "65 Acres", "EMI Avail"] },
            { id: 'p11', region: 'Mumbai', category: 'Mega Project', name: "Golden Heights @ Sadasivapet",
                location: "Sadasivapet", price: "₹10,499", sizes: "Var.", tags: ["DTCP", "Same as Smart County"] },
            { id: 'p12', region: 'Warangal', category: 'Standard', name: "RK Enclave", location: "Ghatkesar",
                price: "₹18,899", sizes: "Var.", tags: ["HMDA", "Near AIIMS"] },
            { id: 'p13', region: 'Warangal', category: 'Value', name: "Rayan Enclave", location: "Bibinagar",
                price: "₹13,399", sizes: "Var.", tags: ["HMDA", "Warangal Hwy"] },
            { id: 'p14', region: 'Warangal', category: 'Value', name: "Aabharana", location: "Yadadri", price: "₹11,499",
                sizes: "110-165 Sq.Yd", tags: ["DTCP", "EMI Available"] },
            { id: 'p15', region: 'Vijayawada', category: 'Premium', name: "Prakriti Hill Township", location: "Piglipur",
                price: "₹22,999", sizes: "Var.", tags: ["Residential"] },
            { id: 'p16', region: 'Vijayawada', category: 'Premium', name: "Medha County", location: "Koheda (East)",
                price: "₹20,999", sizes: "Var.", tags: ["HMDA"] },
        ];

        const FILTER_TABS = [
            { label: "All", value: "All" },
            { label: "Shadnagar", value: "Shadnagar" },
            { label: "Mumbai Hwy", value: "Mumbai" },
            { label: "Warangal Hwy", value: "Warangal" },
            { label: "Vijayawada", value: "Vijayawada" },
        ];

        const MOTIVATIONAL_QUOTES = [
            "🔥 Hustle until your haters ask if you're hiring.",
            "⚡ Winners never quit, quitters never win.",
            "🚀 The only limit is your own mind.",
            "💪 Pressure makes diamonds. Stay hard.",
            "🏆 Champions are made in the off-season.",
            "🎯 Focus on your goal, not the noise.",
            "🔥 Be so good they can't ignore you.",
            "⚡ Your future is created by what you do today.",
        ];

        const formatINR = (n) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR',
            maximumFractionDigits: 0 }).format(n);

        // ——— Confetti burst ———
        function fireConfetti(count = 30) {
            const colors = ['#ff4e00', '#f5c518', '#ff6b35', '#ffd700', '#ff2d2d', '#ff9f1c', '#00ff88', '#ff00ff'];
            const container = document.body;
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'confetti-piece';
                el.style.left = (10 + Math.random() * 80) + '%';
                el.style.top = (10 + Math.random() * 40) + '%';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.width = (4 + Math.random() * 8) + 'px';
                el.style.height = (4 + Math.random() * 8) + 'px';
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                el.style.animationDuration = (1.0 + Math.random() * 1.4) + 's';
                el.style.animationDelay = (Math.random() * 0.8) + 's';
                el.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(el);
                setTimeout(() => el.remove(), 3000);
            }
        }

        // ——— REACT APP ———
        const App = () => {
            const [entered, setEntered] = useState(false);
            const [isMuted, setIsMuted] = useState(false);
            const [audioLoaded, setAudioLoaded] = useState(false);
            const [audioError, setAudioError] = useState(false);
            const [audioPlaying, setAudioPlaying] = useState(false);
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
            const [allotments, setAllotments] = useState(0);
            const [revenueInput, setRevenueInput] = useState("");
            const [activeFilter, setActiveFilter] = useState("All");
            const [quoteIndex, setQuoteIndex] = useState(0);
            const [prevTierId, setPrevTierId] = useState(null);

            const audioRef = useRef(null);
            const quoteIntervalRef = useRef(null);
            const timerRef = useRef(null);

            const revenue = parseFloat(revenueInput.replace(/,/g, '')) || 0;
            const commission = revenue * 0.19;

            const currentTier = useMemo(() => {
                let best = null;
                for (const t of BONANZA_TIERS) {
                    if (allotments >= t.allotments && revenue >= t.revReq) best = t;
                }
                return best;
            }, [allotments, revenue]);

            const nextTier = useMemo(() => {
                if (!currentTier) return BONANZA_TIERS[0];
                const idx = BONANZA_TIERS.findIndex(t => t.id === currentTier.id);
                return BONANZA_TIERS[idx + 1] || null;
            }, [currentTier]);

            const filteredProjects = activeFilter === "All" ?
                PROJECTS :
                PROJECTS.filter(p => p.region === activeFilter);

            // ——— Timer ———
            useEffect(() => {
                const target = new Date("September 30, 2026 23:59:59").getTime();
                timerRef.current = setInterval(() => {
                    const now = Date.now();
                    const d = target - now;
                    if (d <= 0) {
                        clearInterval(timerRef.current);
                        setTimeLeft({ days: 0, hours: 0, minutes: 0, seconds: 0 });
                    } else {
                        setTimeLeft({
                            days: Math.floor(d / 86400000),
                            hours: Math.floor((d % 86400000) / 3600000),
                            minutes: Math.floor((d % 3600000) / 60000),
                            seconds: Math.floor((d % 60000) / 1000),
                        });
                    }
                }, 1000);
                return () => clearInterval(timerRef.current);
            }, []);

            // ——— Quote Rotator ———
            useEffect(() => {
                quoteIntervalRef.current = setInterval(() => {
                    setQuoteIndex(i => (i + 1) % MOTIVATIONAL_QUOTES.length);
                }, 5000);
                return () => clearInterval(quoteIntervalRef.current);
            }, []);

            // ——— Confetti on tier unlock ———
            useEffect(() => {
                if (currentTier && currentTier.id !== prevTierId) {
                    setPrevTierId(currentTier.id);
                    fireConfetti(40);
                }
            }, [currentTier]);

            // ——— Audio event listeners ———
            useEffect(() => {
                const audio = audioRef.current;
                if (!audio) return;

                const handleLoaded = () => {
                    setAudioLoaded(true);
                    setAudioError(false);
                };
                const handleError = () => {
                    setAudioError(true);
                    setAudioLoaded(false);
                };
                const handlePlay = () => setAudioPlaying(true);
                const handlePause = () => setAudioPlaying(false);
                const handleEnded = () => setAudioPlaying(false);

                audio.addEventListener('loadeddata', handleLoaded);
                audio.addEventListener('error', handleError);
                audio.addEventListener('play', handlePlay);
                audio.addEventListener('pause', handlePause);
                audio.addEventListener('ended', handleEnded);

                // Check if already loaded
                if (audio.readyState >= 2) {
                    setAudioLoaded(true);
                }

                return () => {
                    audio.removeEventListener('loadeddata', handleLoaded);
                    audio.removeEventListener('error', handleError);
                    audio.removeEventListener('play', handlePlay);
                    audio.removeEventListener('pause', handlePause);
                    audio.removeEventListener('ended', handleEnded);
                };
            }, []);

            // ——— Entrance handler ———
            const handleEnter = useCallback(() => {
                setEntered(true);
                const overlay = document.getElementById('entrance-overlay');
                if (overlay) overlay.classList.add('hidden');

                // Play audio with robust handling
                const audio = audioRef.current;
                if (audio) {
                    audio.volume = 0.35;
                    const playPromise = audio.play();
                    if (playPromise !== undefined) {
                        playPromise.catch((e) => {
                            console.warn('Audio play blocked:', e);
                            setAudioError(true);
                            // Retry on user interaction
                            const resume = () => {
                                if (audioRef.current) {
                                    audioRef.current.play().catch(() => {});
                                }
                                document.removeEventListener('click', resume);
                                document.removeEventListener('touchstart', resume);
                            };
                            document.addEventListener('click', resume, { once: true });
                            document.addEventListener('touchstart', resume, { once: true });
                        });
                    }
                }
            }, []);

            // ——— Mute toggle ———
            const toggleMute = useCallback(() => {
                const newMute = !isMuted;
                setIsMuted(newMute);
                const audio = audioRef.current;
                if (audio) {
                    audio.muted = newMute;
                    if (!newMute) {
                        audio.play().catch(() => {});
                    }
                }
            }, [isMuted]);

            // ——— Revenue helpers ———
            const handleRevenueChange = (e) => {
                const val = e.target.value.replace(/[^0-9]/g, '');
                setRevenueInput(val);
            };
            const addRevenue = (amount) => {
                setRevenueInput((revenue + amount).toString());
            };

            // ——— Render Entrance ———
            if (!entered) {
                return (
                    <div id="entrance-overlay">
                        <div className="text-center z-10 px-4 max-w-lg mx-auto">
                            <div className="relative inline-block mb-3 md:mb-5">
                                <i className="fa-solid fa-fire-flame-curved text-5xl sm:text-7xl md:text-8xl text-fire-500 animate-pulse-fast"></i>
                                <div className="absolute -inset-4 rounded-full bg-fire-500/10 blur-2xl animate-pulse"></div>
                            </div>
                            <h1 className="font-display text-3xl sm:text-5xl md:text-7xl font-black uppercase text-gradient leading-tight drop-shadow-lg">
                                Rise Up 90
                            </h1>
                            <p className="text-gray-400 text-xs sm:text-base md:text-lg mt-1.5 md:mt-3 uppercase tracking-[0.15em] font-semibold">
                                The Challenge Starts Now.
                            </p>
                            <button
                                onClick={handleEnter}
                                className="mt-5 md:mt-8 bg-gradient-to-r from-fire-600 to-fire-500 hover:from-fire-500 hover:to-gold-500 text-white font-display font-black text-base sm:text-lg md:text-2xl py-3 px-7 md:py-4.5 md:px-12 rounded-full shadow-[0_0_40px_rgba(255,78,0,0.35)] hover:shadow-[0_0_60px_rgba(255,215,0,0.4)] transform hover:scale-105 transition-all duration-300 uppercase tracking-wider w-full sm:w-auto touch-manipulation active:scale-95"
                            >
                                <i className="fa-solid fa-bolt mr-2"></i> Ignite
                                <i className="fa-solid fa-arrow-right ml-2"></i>
                            </button>
                            <div className="flex items-center justify-center gap-2 mt-3 md:mt-5 text-[8px] sm:text-[10px] text-gray-600 font-bold tracking-widest uppercase">
                                <i className="fa-solid fa-headphones text-fire-500/60"></i>
                                <span className="audio-hint">Tap · Audio experience</span>
                                <i className="fa-solid fa-music text-fire-500/60"></i>
                            </div>
                        </div>
                    </div>
                );
            }

            // ——— MAIN DASHBOARD ———
            return (
                <div className="min-h-screen p-2 sm:p-3 md:p-6 font-sans pb-20 relative z-10 no-scroll-x">

                    {/* Audio Element */}
                    <audio
                        ref={audioRef}
                        src="https://ronianurag.github.io/90-DAYS/passo.mp3"
                        loop
                        preload="auto"
                        muted={isMuted}
                    />

                    {/* Audio Control + Status */}
                    <div className="fixed top-2 right-2 sm:top-3 sm:right-3 md:top-5 md:right-5 z-50 flex items-center gap-2">
                        {/* Audio status indicator */}
                        <div className="hidden sm:flex items-center gap-1.5 bg-black/60 backdrop-blur-sm rounded-full px-2.5 py-1 border border-gray-700/50">
                            <span className={`w-1.5 h-1.5 rounded-full ${audioPlaying ? 'bg-green-400 animate-pulse' : audioError ? 'bg-red-500' : audioLoaded ? 'bg-yellow-400' : 'bg-gray-500'}`}></span>
                            <span className="text-[8px] text-gray-400 font-medium tracking-wider">
                                {audioPlaying ? 'LIVE' : audioError ? '⚠️ Audio' : audioLoaded ? 'Ready' : 'Loading...'}
                            </span>
                        </div>
                        {/* Mute button */}
                        <button
                            onClick={toggleMute}
                            className="card-glass p-2 sm:p-2.5 rounded-full text-white hover:text-fire-500 border border-gray-700 transition-all shadow-lg backdrop-blur-md hover:border-fire-500/50 touch-manipulation"
                            aria-label="Toggle music"
                        >
                            {isMuted ?
                                <i className="fa-solid fa-volume-xmark text-xs sm:text-sm md:text-base w-4 text-center text-gray-500"></i> :
                                <i className="fa-solid fa-volume-high text-xs sm:text-sm md:text-base w-4 text-center text-fire-500 animate-pulse-fast"></i>
                            }
                        </button>
                    </div>

                    {/* ——— HEADER ——— */}
                    <div className="text-center mb-4 sm:mb-6 md:mb-8 mt-10 sm:mt-12 md:mt-0 px-1">
                        <h1 className="font-display text-2xl sm:text-4xl md:text-6xl lg:text-7xl font-black uppercase text-gradient leading-tight tracking-tight drop-shadow-[0_0_30px_rgba(255,78,0,0.10)]">
                            Rise Up 90
                        </h1>
                        <div className="mt-1 max-w-2xl mx-auto px-2">
                            <p className="text-gray-400 text-[9px] sm:text-xs md:text-base font-semibold tracking-widest uppercase opacity-80 min-h-[2.2em] flex items-center justify-center gap-1.5">
                                <i className="fa-solid fa-quote-left text-fire-500/40 text-[7px] sm:text-[10px]"></i>
                                <span className="text-center leading-tight text-[10px] sm:text-sm md:text-base">{MOTIVATIONAL_QUOTES[quoteIndex]}</span>
                                <i className="fa-solid fa-quote-right text-fire-500/40 text-[7px] sm:text-[10px]"></i>
                            </p>
                        </div>
                    </div>

                    {/* ——— TIMER ——— */}
                    <div className="flex justify-center gap-1 sm:gap-2 md:gap-4 mb-5 sm:mb-7 md:mb-9">
                        {[
                            { label: 'Days', value: timeLeft.days },
                            { label: 'Hrs', value: timeLeft.hours },
                            { label: 'Min', value: timeLeft.minutes },
                            { label: 'Sec', value: timeLeft.seconds }
                        ].map((t, i) => (
                            <div
                                key={i}
                                className="card-glass rounded-xl p-1.5 sm:p-3 md:p-4 min-w-[44px] sm:min-w-[68px] md:min-w-[90px] lg:min-w-[110px] flex flex-col items-center justify-center border-t-2 border-t-fire-500 shadow-[0_0_20px_rgba(255,78,0,0.04)]"
                            >
                                <span className="font-display text-lg sm:text-2xl md:text-4xl lg:text-5xl font-bold text-white timer-digit leading-none">
                                    {String(t.value).padStart(2, '0')}
                                </span>
                                <span className="text-[6px] sm:text-[9px] md:text-xs text-gray-400 uppercase font-bold tracking-widest mt-0.5">
                                    {t.label}
                                </span>
                            </div>
                        ))}
                    </div>

                    {/* ——— MAIN GRID ——— */}
                    <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-3 sm:gap-4 md:gap-6">

                        {/* LEFT COLUMN */}
                        <div className="lg:col-span-5 flex flex-col gap-3 sm:gap-4">

                            {/* Commission */}
                            <div className="card-glass rounded-2xl p-3 sm:p-4 md:p-5 relative overflow-hidden group card-enter border-l-4 border-l-green-500">
                                <div className="absolute inset-0 bg-gradient-to-r from-green-900/20 to-emerald-900/10 opacity-60"></div>
                                <div className="relative z-10 text-center">
                                    <h2 className="text-gray-400 uppercase tracking-[0.12em] text-[8px] sm:text-[10px] md:text-xs font-bold mb-0.5">
                                        <i className="fa-solid fa-money-bill-wave text-green-400 mr-1"></i> Your 19% Commission
                                    </h2>
                                    <div className="font-display text-xl sm:text-3xl md:text-4xl lg:text-5xl font-black text-green-400 commission-pulse break-words drop-shadow-[0_0_20px_rgba(74,222,128,0.20)]">
                                        {formatINR(commission)}
                                    </div>
                                    {commission > 0 && (
                                        <div className="mt-0.5 text-green-300 text-[8px] sm:text-[10px] md:text-xs font-bold animate-pulse uppercase tracking-wider">
                                            ⚡ Pure Profit — Keep Crushing!
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Inputs */}
                            <div className="card-glass rounded-2xl p-3 sm:p-4 md:p-5 border-l-4 border-l-fire-500 card-enter">
                                <h3 className="font-display text-sm sm:text-lg md:text-xl font-bold mb-2.5 sm:mb-3 text-white uppercase border-b border-gray-800 pb-1.5 flex items-center gap-2">
                                    <i className="fa-solid fa-sliders text-fire-500 text-xs sm:text-sm"></i> Log Progress
                                </h3>

                                <div className="mb-3 sm:mb-3.5">
                                    <label className="block text-gray-400 text-[8px] sm:text-[10px] md:text-xs font-bold mb-1 uppercase tracking-wider">
                                        <i className="fa-solid fa-building mr-1"></i> Allotments / Bookings
                                    </label>
                                    <div className="flex items-center">
                                        <button
                                            onClick={() => setAllotments(Math.max(0, allotments - 1))}
                                            className="bg-gray-800 hover:bg-gray-700 text-white p-2 sm:p-3 rounded-l-xl transition touch-manipulation active:scale-95"
                                        >
                                            <i className="fa-solid fa-minus text-xs sm:text-sm"></i>
                                        </button>
                                        <input
                                            type="number"
                                            value={allotments}
                                            onChange={(e) => setAllotments(parseInt(e.target.value) || 0)}
                                            className="w-full bg-black border-y border-gray-700 text-center text-lg sm:text-2xl md:text-3xl font-display font-bold text-white py-1 sm:py-2 focus:outline-none focus:border-fire-500 transition min-w-0"
                                        />
                                        <button
                                            onClick={() => setAllotments(allotments + 1)}
                                            className="bg-fire-600 hover:bg-fire-500 text-white p-2 sm:p-3 rounded-r-xl transition touch-manipulation active:scale-95"
                                        >
                                            <i className="fa-solid fa-plus text-xs sm:text-sm"></i>
                                        </button>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-gray-400 text-[8px] sm:text-[10px] md:text-xs font-bold mb-1 uppercase tracking-wider">
                                        <i className="fa-solid fa-indian-rupee-sign mr-1"></i> Total Plot Value Sold
                                    </label>
                                    <input
                                        type="text"
                                        value={revenueInput}
                                        onChange={handleRevenueChange}
                                        placeholder="Enter amount …"
                                        className="w-full bg-black border border-gray-700 rounded-xl text-base sm:text-xl md:text-2xl font-display font-bold text-white p-2 sm:p-3 focus:outline-none focus:border-fire-500 transition mb-2"
                                    />
                                    <div className="flex flex-wrap gap-1 sm:gap-1.5">
                                        <button
                                            onClick={() => addRevenue(1000000)}
                                            className="text-[8px] sm:text-[10px] md:text-xs bg-gray-800 hover:bg-gray-700 px-1.5 sm:px-2.5 py-1 sm:py-1.5 rounded-lg text-gray-300 transition flex-1 text-center whitespace-nowrap touch-manipulation active:scale-95"
                                        >
                                            +1 Lakh
                                        </button>
                                        <button
                                            onClick={() => addRevenue(5000000)}
                                            className="text-[8px] sm:text-[10px] md:text-xs bg-gray-800 hover:bg-gray-700 px-1.5 sm:px-2.5 py-1 sm:py-1.5 rounded-lg text-gray-300 transition flex-1 text-center whitespace-nowrap touch-manipulation active:scale-95"
                                        >
                                            +5 Lakhs
                                        </button>
                                        <button
                                            onClick={() => addRevenue(10000000)}
                                            className="text-[8px] sm:text-[10px] md:text-xs bg-gray-800 hover:bg-gray-700 px-1.5 sm:px-2.5 py-1 sm:py-1.5 rounded-lg text-gold-400 transition flex-1 text-center whitespace-nowrap touch-manipulation active:scale-95"
                                        >
                                            +10 Lakhs
                                        </button>
                                        <button
                                            onClick={() => setRevenueInput("")}
                                            className="text-[8px] sm:text-[10px] md:text-xs bg-red-900/40 hover:bg-red-900/60 px-1.5 sm:px-2.5 py-1 sm:py-1.5 rounded-lg text-red-300 transition touch-manipulation active:scale-95"
                                        >
                                            Reset
                                        </button>
                                    </div>
                                    <div className="mt-1 text-right text-[9px] sm:text-xs text-gray-400 font-medium">
                                        Value: <span className="text-white font-bold">{formatINR(revenue)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* RIGHT COLUMN */}
                        <div className="lg:col-span-7 flex flex-col gap-3 sm:gap-4">

                            {/* Bonanza Status */}
                            <div className="card-glass rounded-2xl p-3 sm:p-4 md:p-5 card-enter">
                                <div className="flex justify-between items-center mb-2.5 sm:mb-3 border-b border-gray-800 pb-1.5">
                                    <h3 className="font-display text-sm sm:text-lg md:text-xl font-bold text-white uppercase flex items-center gap-2">
                                        <i className="fa-solid fa-trophy text-gold-400 text-xs sm:text-sm"></i> Bonanza
                                    </h3>
                                    {currentTier && (
                                        <span className="bg-green-900/40 text-green-400 text-[7px] sm:text-[9px] md:text-xs font-bold px-2 sm:px-2.5 py-0.5 rounded-full border border-green-500/30 animate-pulse-fast whitespace-nowrap">
                                            <i className="fa-solid fa-check-circle mr-0.5"></i> Unlocked
                                        </span>
                                    )}
                                </div>

                                {/* Current Reward */}
                                {currentTier ? (
                                    <div className="bg-gradient-to-r from-fire-600/20 to-gold-500/10 rounded-xl p-2.5 sm:p-3 mb-3 text-center border border-fire-500/30 transform hover:scale-[1.01] transition shadow-[0_0_25px_rgba(255,78,0,0.05)]">
                                        <p className="text-[7px] sm:text-[9px] font-bold uppercase tracking-wider mb-0.5 text-white/60">
                                            <i className="fa-solid fa-gem mr-1 text-gold-400"></i> Reward Unlocked
                                        </p>
                                        <h4 className="font-display text-sm sm:text-lg md:text-xl lg:text-2xl font-black text-white drop-shadow-[0_0_15px_rgba(255,215,0,0.12)] leading-tight">
                                            {currentTier.prize}
                                        </h4>
                                    </div>
                                ) : (
                                    <div className="bg-gray-800/20 rounded-xl p-2.5 sm:p-3 mb-3 text-center border border-gray-700">
                                        <p className="text-[7px] sm:text-[9px] font-bold uppercase tracking-wider text-gray-400">
                                            No Rewards Yet
                                        </p>
                                        <h4 className="font-display text-xs sm:text-base font-bold text-gray-300">Start Booking to Unlock</h4>
                                    </div>
                                )}

                                {/* Next Target */}
                                {nextTier && (
                                    <div className="mb-3">
                                        <h4 className="text-gray-400 font-bold uppercase text-[7px] sm:text-[9px] md:text-xs mb-1.5 tracking-wider flex items-center gap-1">
                                            <i className="fa-solid fa-crosshairs text-fire-500"></i>
                                            Next: <span className="text-white">{nextTier.name}</span>
                                        </h4>
                                        <div className="grid grid-cols-2 gap-1.5 sm:gap-2">
                                            <div className="bg-black/40 p-2 sm:p-2.5 rounded-xl border border-gray-700 text-center">
                                                <p className="text-[6px] sm:text-[8px] text-gray-500 uppercase tracking-wider">Allotments</p>
                                                <p className={`font-display font-bold text-xs sm:text-base ${allotments >= nextTier.allotments ? 'text-green-400' : 'text-white'}`}>
                                                    {allotments} / {nextTier.allotments}
                                                </p>
                                                {allotments >= nextTier.allotments && (
                                                    <p className="text-green-400 text-[7px] sm:text-[9px] font-bold"><i className="fa-solid fa-check mr-0.5"></i> Done</p>
                                                )}
                                            </div>
                                            <div className="bg-black/40 p-2 sm:p-2.5 rounded-xl border border-gray-700 text-center">
                                                <p className="text-[6px] sm:text-[8px] text-gray-500 uppercase tracking-wider">Revenue</p>
                                                <p className={`font-display font-bold text-xs sm:text-base ${revenue >= nextTier.revReq ? 'text-green-400' : 'text-white'}`}>
                                                    {revenue >= nextTier.revReq ? "✅ Cleared" : (nextTier.revText || "—")}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* All Tiers - scrollable */}
                                <div className="space-y-1.5 max-h-[180px] sm:max-h-[220px] overflow-y-auto pr-1">
                                    {BONANZA_TIERS.map((tier) => {
                                        const unlocked = currentTier && tier.id <= currentTier.id;
                                        const isNext = nextTier && tier.id === nextTier.id;
                                        let bg = "bg-black/30 border-gray-800";
                                        let txt = "text-gray-400";
                                        let icon = <i className="fa-solid fa-lock text-gray-600 text-[8px] sm:text-[10px]"></i>;
                                        if (unlocked) {
                                            bg = "bg-green-900/20 border-green-500/30 shadow-[0_0_12px_rgba(74,222,128,0.03)]";
                                            txt = "text-green-400";
                                            icon = <i className="fa-solid fa-check-circle text-green-400 text-[8px] sm:text-[10px]"></i>;
                                        } else if (isNext) {
                                            bg = "bg-fire-900/20 border-fire-500/50 shadow-[0_0_20px_rgba(255,78,0,0.05)]";
                                            txt = "text-white";
                                            icon = <i className="fa-solid fa-crosshairs text-fire-500 animate-pulse-fast text-[8px] sm:text-[10px]"></i>;
                                        }
                                        return (
                                            <div key={tier.id} className={`flex items-center justify-between p-1.5 sm:p-2 rounded-xl border ${bg} transition-all`}>
                                                <div className="flex items-center gap-2 sm:gap-2.5 min-w-0">
                                                    <div className="w-3.5 sm:w-4 text-center flex-shrink-0">{icon}</div>
                                                    <div className="min-w-0">
                                                        <div className={`font-bold text-[9px] sm:text-xs truncate ${txt}`}>{tier.prize}</div>
                                                        <div className="text-[6px] sm:text-[8px] text-gray-500">Req: {tier.allotments} allot {tier.revReq > 0 ? `+ ${tier.revText}` : ''}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    <p className="text-[6px] sm:text-[8px] text-gray-500 mt-1 text-center">* 25% of plot value paid to qualify</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* ——— PROJECT CHEAT SHEET ——— */}
                    <div className="max-w-7xl mx-auto mt-4 sm:mt-6">
                        <div className="card-glass rounded-2xl p-3 sm:p-4 md:p-5 card-enter">
                            <h3 className="font-display text-sm sm:text-lg md:text-xl font-bold mb-2.5 sm:mb-3 text-white uppercase border-b border-gray-800 pb-1.5 flex items-center gap-2">
                                <i className="fa-solid fa-map-location-dot text-fire-500 text-xs sm:text-sm"></i> Project Cheat Sheet
                            </h3>

                            {/* Filter Tabs - horizontal scroll on mobile */}
                            <div className="flex overflow-x-auto hide-scrollbar gap-1 sm:gap-1.5 mb-3 sm:mb-4 pb-1 -mx-2 px-2 sm:mx-0 sm:px-0">
                                {FILTER_TABS.map(tab => (
                                    <button
                                        key={tab.value}
                                        onClick={() => setActiveFilter(tab.value)}
                                        className={`px-2 sm:px-3.5 py-0.5 sm:py-1.5 rounded-full text-[7px] sm:text-[10px] md:text-xs font-bold uppercase transition-all whitespace-nowrap flex-shrink-0 touch-manipulation ${
                                            activeFilter === tab.value ?
                                            'bg-fire-600 text-white shadow-[0_0_15px_rgba(227,60,0,0.25)]' :
                                            'bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white'
                                        }`}
                                    >
                                        {tab.label}
                                    </button>
                                ))}
                            </div>

                            {/* Projects Grid */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-2 sm:gap-3">
                                {filteredProjects.map((proj, idx) => (
                                    <div
                                        key={proj.id}
                                        className="bg-black/50 border border-gray-800 rounded-xl p-2 sm:p-3 hover:border-gray-600 transition group relative overflow-hidden flex flex-col justify-between hover:shadow-[0_0_25px_rgba(255,78,0,0.03)]"
                                        style={{ animationDelay: `${idx * 0.03}s` }}
                                    >
                                        <div>
                                            <div className="absolute top-0 right-0 bg-gray-800/80 text-[6px] sm:text-[8px] font-bold px-1.5 py-0.5 rounded-bl-xl text-gray-300 uppercase tracking-wider">
                                                {proj.category}
                                            </div>
                                            <h4 className="font-display font-bold text-[10px] sm:text-sm md:text-base text-white mb-0.5 pr-12 leading-tight project-name">
                                                {proj.name}
                                            </h4>
                                            <p className="text-gray-400 text-[8px] sm:text-[10px] mb-1 sm:mb-1.5 truncate">
                                                <i className="fa-solid fa-location-dot text-red-500 mr-0.5 text-[6px] sm:text-[8px]"></i> {proj.location}
                                            </p>
                                        </div>
                                        <div className="flex flex-wrap items-end justify-between gap-1 sm:gap-1.5 mt-auto">
                                            <div>
                                                <div className="text-[6px] sm:text-[8px] text-gray-500 uppercase tracking-wider">Starting</div>
                                                <div className="font-bold text-gold-400 text-[10px] sm:text-sm leading-none">
                                                    {proj.price}
                                                    <span className="text-[6px] sm:text-[8px] font-normal text-gray-400">
                                                        {proj.sizes && proj.sizes.includes('Gunta') ? '' : '/ sq.yd'}
                                                    </span>
                                                </div>
                                            </div>
                                            <div className="flex gap-0.5 flex-wrap justify-end">
                                                {proj.tags.slice(0, 2).map((tag, i) => (
                                                    <span key={i} className="bg-gray-800/70 text-gray-300 text-[5px] sm:text-[7px] px-1 py-0.5 rounded whitespace-nowrap">
                                                        {tag}
                                                    </span>
                                                ))}
                                                {proj.tags.length > 2 && (
                                                    <span className="bg-gray-800/70 text-gray-400 text-[5px] sm:text-[7px] px-1 py-0.5 rounded whitespace-nowrap">
                                                        +{proj.tags.length - 2}
                                                    </span>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* ——— FOOTER ——— */}
                    <div className="max-w-7xl mx-auto mt-4 sm:mt-6 text-center text-[7px] sm:text-[9px] text-gray-600 border-t border-gray-800/50 pt-2.5 sm:pt-4">
                        <p className="tracking-widest uppercase flex items-center justify-center gap-1 flex-wrap">
                            <i className="fa-solid fa-fire text-fire-500/40"></i>
                            Rise Up 90 — Dominate. Crush. Win.
                            <i className="fa-solid fa-fire text-fire-500/40"></i>
                        </p>
                    </div>
                </div>
            );
        };

        // ——— Generate fire particles ———
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('fire-particles');
            if (container) {
                const count = window.innerWidth < 480 ? 20 : 40;
                for (let i = 0; i < count; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    const size = window.innerWidth < 480 ? (2 + Math.random() * 3) : (3 + Math.random() * 5);
                    p.style.width = size + 'px';
                    p.style.height = size + 'px';
                    p.style.left = Math.random() * 100 + '%';
                    p.style.top = Math.random() * 100 + '%';
                    p.style.animationDuration = (2.0 + Math.random() * 3) + 's';
                    p.style.animationDelay = (Math.random() * 4) + 's';
                    p.style.opacity = 0.12 + Math.random() * 0.30;
                    container.appendChild(p);
                }
            }
        });

        // ——— RENDER REACT ———
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Rise Up 90 • Money Dashboard</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Oswald', 'sans-serif'],
                    },
                    colors: {
                        fire: { 500: '#ff4e00', 600: '#e33c00', 700: '#c42b00' },
                        gold: { 400: '#ffd700', 500: '#f5c518' }
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0500;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }
        /* clean gradient background – no blur balls, no flames */
        .bg-gradient-clean {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(circle at 30% 40%, #1f0a00 0%, #080200 80%);
            pointer-events: none;
        }
        /* MONEY ICONS – interactive, mouse-following */
        .money-icon {
            position: fixed;
            font-size: 1.6rem;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            pointer-events: none;
            z-index: 2;
            transition: transform 0.15s ease, opacity 0.3s ease;
            will-change: transform, left, top;
            opacity: 0.7;
            filter: drop-shadow(0 0 6px rgba(255, 200, 0, 0.3));
        }
        .money-icon:hover {
            opacity: 1;
            transform: scale(1.2) !important;
        }
        /* card styling */
        .card-glass {
            background: rgba(15, 10, 8, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 78, 0, 0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255, 120, 0, 0.08);
        }
        .card-glass-light {
            background: rgba(25, 18, 14, 0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 215, 0, 0.1);
        }
        .text-gradient {
            background: linear-gradient(135deg, #ff4e00, #f5c518, #ff4e00);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s ease infinite;
        }
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-track { background: #1a0a05; }
        ::-webkit-scrollbar-thumb { background: #ff4e00; border-radius: 8px; }
        * { -webkit-tap-highlight-color: transparent; }
        button, input { touch-action: manipulation; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // DATA
        const BONANZA_TIERS = [
            { id: 1, name: "Vietnam Trip", allotments: 2, revReq: 0, revText: "-", prize: "Vietnam Trip (Oct 2nd Wk)" },
            { id: 2, name: "Gold + Vietnam", allotments: 3, revReq: 5000000, revText: "50 Lakhs", prize: "8g Gold + Vietnam" },
            { id: 3, name: "China + iPhone", allotments: 5, revReq: 10000000, revText: "1 Crore", prize: "China + iPhone 17 Pro Max" },
            { id: 4, name: "Car Down Payment", allotments: 10, revReq: 15000000, revText: "1.5 Crore", prize: "China + 4.5L Car DP" },
            { id: 5, name: "House + Car", allotments: 15, revReq: 20000000, revText: "2 Crore", prize: "China + 14L House + 4L Car DP" },
            { id: 6, name: "Ultimate Bonanza", allotments: 20, revReq: 25000000, revText: "2.5 Crore", prize: "China + 24L House + 5L Car DP" },
        ];

        const PROJECTS = [
            { id: 'p1', region: 'Shadnagar', category: 'Premium / Wellness', name: "Golden Heights Health Village", location: "Balanagar", price: "₹19,999", sizes: "150-400 Sq.Yd", tags: ["MUDA", "75 Acres", "51+ Amenities"] },
            { id: 'p2', region: 'Shadnagar', category: 'Standard', name: "Iconic 2, 3, 4, 5", location: "Shadnagar", price: "₹18,399", sizes: "Var.", tags: ["HMDA/DTCP"] },
            { id: 'p3', region: 'Shadnagar', category: 'Budget', name: "Spring City", location: "Shadnagar", price: "₹10,599", sizes: "Var.", tags: ["HMDA/DTCP"] },
            { id: 'p4', region: 'Shadnagar', category: 'Standard', name: "Paradise 2", location: "Shadnagar", price: "₹17,399", sizes: "Var.", tags: ["HMDA/DTCP"] },
            { id: 'p5', region: 'Shadnagar', category: 'Premium', name: "Iconic 6 & 7", location: "Bengaluru Hwy", price: "₹24,999", sizes: "Var.", tags: ["Highway Facing"] },
            { id: 'p6', region: 'Shadnagar', category: 'Premium', name: "Iconic 9", location: "Burgula", price: "₹19,999", sizes: "Var.", tags: ["HMDA"] },
            { id: 'p7', region: 'Shadnagar', category: 'Premium Farm', name: "Dream Valley 2", location: "Kamsanpally", price: "₹10.16L", sizes: "Per Gunta", tags: ["Resort Mem.", "Farm Plots"] },
            { id: 'p8', region: 'Shadnagar', category: 'Premium Farm', name: "Dream Valley 3", location: "Nagulapally", price: "₹15.48L", sizes: "Per Gunta", tags: ["Resort Mem.", "Farm Plots"] },
            { id: 'p9', region: 'Shadnagar', category: 'Value', name: "Golden Heights @ Rajapur", location: "Rajapur (NH44)", price: "Contact", sizes: "Var.", tags: ["MUDA", "Spot Reg."] },
            { id: 'p10', region: 'Mumbai', category: 'Mega Project', name: "Golden Heights Smart County", location: "Budhera, Patloor", price: "₹10,499", sizes: "Var.", tags: ["DTCP", "65 Acres", "EMI Avail"] },
            { id: 'p11', region: 'Mumbai', category: 'Mega Project', name: "Golden Heights @ Sadasivapet", location: "Sadasivapet", price: "₹10,499", sizes: "Var.", tags: ["DTCP", "Same as Smart County"] },
            { id: 'p12', region: 'Warangal', category: 'Standard', name: "RK Enclave", location: "Ghatkesar", price: "₹18,899", sizes: "Var.", tags: ["HMDA", "Near AIIMS"] },
            { id: 'p13', region: 'Warangal', category: 'Value', name: "Rayan Enclave", location: "Bibinagar", price: "₹13,399", sizes: "Var.", tags: ["HMDA", "Warangal Hwy"] },
            { id: 'p14', region: 'Warangal', category: 'Value', name: "Aabharana", location: "Yadadri", price: "₹11,499", sizes: "110-165 Sq.Yd", tags: ["DTCP", "EMI Available"] },
            { id: 'p15', region: 'Vijayawada', category: 'Premium', name: "Prakriti Hill Township", location: "Piglipur", price: "₹22,999", sizes: "Var.", tags: ["Residential"] },
            { id: 'p16', region: 'Vijayawada', category: 'Premium', name: "Medha County", location: "Koheda (East)", price: "₹20,999", sizes: "Var.", tags: ["HMDA"] },
        ];

        const FILTER_TABS = [
            { label: "All", value: "All" },
            { label: "Shadnagar", value: "Shadnagar" },
            { label: "Mumbai Hwy", value: "Mumbai" },
            { label: "Warangal Hwy", value: "Warangal" },
            { label: "Vijayawada", value: "Vijayawada" },
        ];

        const formatINR = (number) => {
            return new Intl.NumberFormat('en-IN', {
                style: 'currency',
                currency: 'INR',
                maximumFractionDigits: 0
            }).format(number);
        };

        // ===== CLEAN BACKGROUND (only gradient, no flames/embers) =====
        const CleanBackground = () => {
            return <div className="bg-gradient-clean"></div>;
        };

        // ===== MONEY ICONS (mouse-following) =====
        const MoneyIcons = () => {
            const [mouse, setMouse] = useState({ x: 0, y: 0 });
            const icons = ['fa-solid fa-coins', 'fa-solid fa-sack-dollar', 'fa-solid fa-money-bill-wave', 'fa-solid fa-dollar-sign', 'fa-solid fa-bolt'];

            useEffect(() => {
                const handleMove = (e) => {
                    setMouse({ x: e.clientX, y: e.clientY });
                };
                window.addEventListener('mousemove', handleMove);
                return () => window.removeEventListener('mousemove', handleMove);
            }, []);

            return (
                <>
                    {icons.map((icon, idx) => {
                        const angle = (idx / icons.length) * Math.PI * 2;
                        const radius = 60 + Math.sin(Date.now() / 1000 + idx) * 15;
                        const x = mouse.x + Math.cos(angle + Date.now() / 2000) * radius;
                        const y = mouse.y + Math.sin(angle + Date.now() / 2000) * radius;
                        return (
                            <i
                                key={idx}
                                className={`${icon} money-icon`}
                                style={{
                                    left: x - 20,
                                    top: y - 20,
                                    transform: `scale(${0.8 + Math.sin(Date.now() / 1000 + idx) * 0.15}) rotate(${Math.sin(Date.now() / 1500 + idx) * 15}deg)`,
                                    fontSize: `${1.4 + Math.sin(Date.now() / 1200 + idx) * 0.4}rem`,
                                    opacity: 0.5 + Math.sin(Date.now() / 800 + idx) * 0.25,
                                    transition: 'left 0.1s ease-out, top 0.1s ease-out',
                                    zIndex: 3,
                                }}
                            />
                        );
                    })}
                </>
            );
        };

        // ===== MAIN APP =====
        const App = () => {
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
            const [allotments, setAllotments] = useState(0);
            const [revenueInput, setRevenueInput] = useState("");
            const [activeFilter, setActiveFilter] = useState("All");
            const [entered, setEntered] = useState(false);
            const [isMuted, setIsMuted] = useState(false);
            const audioRef = useRef(null);
            
            const revenue = parseFloat(revenueInput.replace(/,/g, '')) || 0;
            const commission = revenue * 0.19;
            const filteredProjects = activeFilter === "All" ? PROJECTS : PROJECTS.filter(p => p.region === activeFilter);

            useEffect(() => {
                const targetDate = new Date("September 30, 2026 23:59:59").getTime();
                const interval = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = targetDate - now;
                    if (distance < 0) {
                        clearInterval(interval);
                        setTimeLeft({ days: 0, hours: 0, minutes: 0, seconds: 0 });
                    } else {
                        setTimeLeft({
                            days: Math.floor(distance / (1000 * 60 * 60 * 24)),
                            hours: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                            minutes: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                            seconds: Math.floor((distance % (1000 * 60)) / 1000)
                        });
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (entered && audioRef.current) {
                    audioRef.current.volume = 0.4;
                    audioRef.current.loop = true;
                    audioRef.current.play().catch(e => console.log("autoplay blocked"));
                }
            }, [entered]);

            const getCurrentTier = () => {
                let highest = null;
                for (let i = 0; i < BONANZA_TIERS.length; i++) {
                    const tier = BONANZA_TIERS[i];
                    if (allotments >= tier.allotments && revenue >= tier.revReq) {
                        highest = tier;
                    }
                }
                return highest;
            };
            const getNextTier = () => {
                const current = getCurrentTier();
                if (!current) return BONANZA_TIERS[0];
                const currentIndex = BONANZA_TIERS.findIndex(t => t.id === current.id);
                return BONANZA_TIERS[currentIndex + 1] || null;
            };
            const currentTier = getCurrentTier();
            const nextTier = getNextTier();

            const handleRevenueChange = (e) => {
                const val = e.target.value.replace(/[^0-9]/g, '');
                setRevenueInput(val);
            };
            const addRevenue = (amount) => {
                setRevenueInput((revenue + amount).toString());
            };

            const handleEnter = () => {
                setEntered(true);
                if (audioRef.current) {
                    audioRef.current.volume = 0.4;
                    audioRef.current.loop = true;
                    audioRef.current.play().catch(e => console.log("play failed", e));
                }
            };
            const toggleMute = () => {
                if (audioRef.current) {
                    audioRef.current.muted = !isMuted;
                    setIsMuted(!isMuted);
                }
            };

            // ENTRANCE
            if (!entered) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-black p-4 relative overflow-hidden">
                        <CleanBackground />
                        <div className="absolute inset-0 bg-gradient-to-b from-transparent to-black/70 z-0"></div>
                        <div className="text-center z-10 card-glass p-8 sm:p-12 rounded-3xl max-w-lg border-fire-500/40 border shadow-[0_0_60px_rgba(255,78,0,0.25)] w-full mx-4 flex flex-col items-center">
                            <i className="fa-solid fa-fire-flame-curved text-6xl md:text-7xl text-fire-500 mb-6 animate-pulse-fast"></i>
                            <h1 className="font-display text-5xl sm:text-6xl font-black mb-3 uppercase text-gradient drop-shadow-lg leading-tight">Rise Up 90</h1>
                            <p className="text-gray-300 text-sm sm:text-base mb-10 uppercase tracking-[0.2em] font-semibold">IGNITE THE HUSTLE</p>
                            
                            <button onClick={handleEnter} className="bg-gradient-to-r from-fire-600 to-gold-500 hover:from-fire-500 hover:to-gold-400 text-white font-display font-black text-xl py-4 px-10 rounded-full shadow-[0_0_40px_rgba(255,78,0,0.5)] hover:shadow-[0_0_60px_rgba(245,197,24,0.5)] transform hover:scale-105 transition-all uppercase tracking-wider w-full flex items-center justify-center gap-3">
                                <i className="fa-solid fa-play"></i> ENTER THE FIRE
                            </button>
                            <p className="text-[10px] text-gray-500 mt-6 font-bold tracking-widest uppercase flex items-center justify-center gap-1">
                                <i className="fa-solid fa-volume-high text-fire-500"></i> audio experience
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 sm:p-6 md:p-8 font-sans pb-24 relative max-w-7xl mx-auto">
                    <CleanBackground />
                    <MoneyIcons />
                    
                    <audio ref={audioRef} src="https://ronianurag.github.io/90-DAYS/passo.mp3" preload="auto" />

                    <button onClick={toggleMute} className="fixed top-4 right-4 z-50 card-glass w-12 h-12 flex items-center justify-center rounded-full text-white hover:text-fire-500 border border-gray-700 transition-colors shadow-lg backdrop-blur-md">
                        {isMuted ? <i className="fa-solid fa-volume-xmark text-xl"></i> : <i className="fa-solid fa-volume-high text-xl text-fire-500"></i>}
                    </button>

                    {/* Header */}
                    <div className="text-center mb-8 mt-12 sm:mt-8 px-4">
                        <h1 className="font-display text-5xl sm:text-6xl md:text-7xl font-black mb-2 tracking-tight uppercase text-gradient leading-tight">Rise Up 90</h1>
                        <p className="text-gray-400 text-xs sm:text-sm font-semibold tracking-[0.2em] uppercase">
                            <i className="fa-solid fa-fire text-fire-500 mr-2"></i> HUSTLE · DOMINATE · REPEAT
                        </p>
                    </div>

                    {/* Timer */}
                    <div className="flex justify-center gap-3 sm:gap-6 mb-12 flex-wrap">
                        {[
                            { label: 'Days', value: timeLeft.days },
                            { label: 'Hours', value: timeLeft.hours },
                            { label: 'Mins', value: timeLeft.minutes },
                            { label: 'Secs', value: timeLeft.seconds }
                        ].map((time, idx) => (
                            <div key={idx} className="card-glass rounded-2xl p-4 w-20 sm:w-24 md:w-32 flex flex-col items-center justify-center border-t-4 border-t-fire-500 shadow-[inset_0_0_20px_rgba(255,78,0,0.1)]">
                                <span className="font-display text-3xl sm:text-4xl md:text-5xl font-bold text-white mb-1">
                                    {time.value.toString().padStart(2, '0')}
                                </span>
                                <span className="text-[10px] sm:text-xs text-gray-400 uppercase font-bold tracking-widest">{time.label}</span>
                            </div>
                        ))}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8">
                        {/* LEFT COLUMN */}
                        <div className="lg:col-span-5 flex flex-col gap-6">
                            
                            {/* Commission Card */}
                            <div className="card-glass rounded-3xl p-6 relative overflow-hidden group">
                                <div className="absolute top-0 right-0 p-6 opacity-10 group-hover:opacity-20 transition-opacity">
                                    <i className="fa-solid fa-wallet text-7xl text-green-400"></i>
                                </div>
                                <div className="relative z-10">
                                    <h2 className="text-gray-300 uppercase tracking-widest text-xs font-bold mb-2 flex items-center gap-2">
                                        <i className="fa-solid fa-coins text-green-400"></i> YOUR 19% COMMISSION
                                    </h2>
                                    <div className="font-display text-5xl sm:text-6xl font-black text-green-400 break-words drop-shadow-[0_0_20px_rgba(74,222,128,0.3)] leading-none">
                                        {formatINR(commission)}
                                    </div>
                                    {commission > 0 && (
                                        <div className="mt-4 inline-block bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-xs font-bold animate-pulse">
                                            ⚡ FUEL THE FIRE ⚡
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Log Progress Card */}
                            <div className="card-glass rounded-3xl p-6 border-l-4 border-l-fire-500">
                                <div className="flex items-center gap-3 mb-6 border-b border-gray-800 pb-4">
                                    <div className="w-10 h-10 rounded-full bg-fire-500/20 flex items-center justify-center">
                                        <i className="fa-solid fa-sliders text-fire-500"></i>
                                    </div>
                                    <h3 className="font-display text-2xl font-bold text-white uppercase">
                                        LOG PROGRESS
                                    </h3>
                                </div>
                                
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-gray-400 text-xs font-bold mb-2 uppercase tracking-widest">Allotments</label>
                                        <div className="flex items-stretch h-14">
                                            <button onClick={() => setAllotments(Math.max(0, allotments - 1))} className="bg-gray-800 hover:bg-gray-700 text-white w-14 rounded-l-xl flex items-center justify-center transition text-2xl font-medium border-y border-l border-gray-700">−</button>
                                            <input type="number" value={allotments} onChange={(e) => setAllotments(parseInt(e.target.value) || 0)} className="flex-1 bg-black/50 border-y border-gray-700 text-center text-2xl font-display font-bold text-white focus:outline-none" />
                                            <button onClick={() => setAllotments(allotments + 1)} className="bg-fire-600 hover:bg-fire-500 text-white w-14 rounded-r-xl flex items-center justify-center transition text-2xl font-medium border-y border-r border-fire-600">+</button>
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <div className="flex justify-between items-end mb-2">
                                            <label className="block text-gray-400 text-xs font-bold uppercase tracking-widest">Total Plot Value (₹)</label>
                                            <span className="text-xs text-white font-bold">{formatINR(revenue)}</span>
                                        </div>
                                        <input type="text" value={revenueInput} onChange={handleRevenueChange} placeholder="e.g., 5000000" className="w-full bg-black/50 border border-gray-700 rounded-xl text-xl font-display font-bold text-white p-4 h-14 focus:outline-none focus:border-fire-500 transition mb-3" />
                                        
                                        <div className="grid grid-cols-4 gap-2">
                                            <button onClick={() => addRevenue(100000)} className="bg-gray-800 hover:bg-gray-700 py-2.5 rounded-lg text-gray-300 transition text-xs font-bold">+1L</button>
                                            <button onClick={() => addRevenue(500000)} className="bg-gray-800 hover:bg-gray-700 py-2.5 rounded-lg text-gray-300 transition text-xs font-bold">+5L</button>
                                            <button onClick={() => addRevenue(1000000)} className="bg-gray-800 hover:bg-gray-700 py-2.5 rounded-lg text-gold-400 transition text-xs font-bold">+10L</button>
                                            <button onClick={() => setRevenueInput("")} className="bg-red-900/30 hover:bg-red-900/50 py-2.5 rounded-lg text-red-400 transition text-xs font-bold">Reset</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* RIGHT COLUMN */}
                        <div className="lg:col-span-7 flex flex-col gap-6">
                            <div className="card-glass rounded-3xl p-6 flex flex-col h-full">
                                <div className="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full bg-gold-500/20 flex items-center justify-center">
                                            <i className="fa-solid fa-trophy text-gold-500"></i>
                                        </div>
                                        <h3 className="font-display text-2xl font-bold text-white uppercase">
                                            BONANZA
                                        </h3>
                                    </div>
                                    <i className="fa-solid fa-fire text-fire-500 text-2xl animate-pulse-fast"></i>
                                </div>
                                
                                {/* Status Area */}
                                {currentTier ? (
                                    <div className="bg-gradient-to-r from-fire-600 to-gold-500 rounded-2xl p-6 mb-6 text-center transform hover:scale-[1.02] transition shadow-[0_0_30px_rgba(255,78,0,0.3)]">
                                        <span className="inline-block bg-black/30 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest text-white mb-2">🔥 UNLOCKED</span>
                                        <h4 className="font-display text-3xl md:text-4xl font-black text-white">{currentTier.prize}</h4>
                                    </div>
                                ) : (
                                    <div className="bg-gray-800/40 rounded-2xl p-6 mb-6 text-center border border-gray-700/50">
                                        <p className="text-xs font-bold uppercase tracking-widest text-gray-500 mb-1">STATUS</p>
                                        <h4 className="font-display text-2xl font-bold text-white">No Reward Yet. Keep Pushing!</h4>
                                    </div>
                                )}
                                
                                {/* Next Target */}
                                {nextTier && (
                                    <div className="mb-6">
                                        <h4 className="text-gray-400 font-bold uppercase text-xs mb-3 tracking-widest flex items-center gap-2">
                                            <i className="fa-solid fa-crosshairs text-fire-500"></i> NEXT: <span className="text-white">{nextTier.name}</span>
                                        </h4>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-black/40 p-4 rounded-xl border border-gray-700/50">
                                                <p className="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1">Allotments</p>
                                                <div className="flex items-end justify-between">
                                                    <p className={`font-display font-bold text-2xl ${allotments >= nextTier.allotments ? 'text-green-400' : 'text-white'}`}>{allotments} <span className="text-base text-gray-600">/ {nextTier.allotments}</span></p>
                                                    {allotments >= nextTier.allotments && <i className="fa-solid fa-check-circle text-green-400 text-lg"></i>}
                                                </div>
                                            </div>
                                            <div className="bg-black/40 p-4 rounded-xl border border-gray-700/50">
                                                <p className="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1">Revenue</p>
                                                <div className="flex items-end justify-between">
                                                    <p className={`font-display font-bold text-2xl ${revenue >= nextTier.revReq ? 'text-green-400' : 'text-white'}`}>{revenue >= nextTier.revReq ? "Ready" : nextTier.revText || "-"}</p>
                                                    {revenue >= nextTier.revReq && <i className="fa-solid fa-check-circle text-green-400 text-lg"></i>}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                
                                {/* Rewards List */}
                                <div className="space-y-3 overflow-y-auto pr-2 flex-1 min-h-[250px]">
                                    {BONANZA_TIERS.map((tier) => {
                                        const isUnlocked = currentTier && tier.id <= currentTier.id;
                                        const isNext = nextTier && tier.id === nextTier.id;
                                        let bgClass = "bg-black/30 border-gray-800/50";
                                        let textClass = "text-gray-500";
                                        let icon = <i className="fa-solid fa-lock text-gray-600"></i>;
                                        
                                        if (isUnlocked) { 
                                            bgClass = "bg-green-900/10 border-green-500/20"; 
                                            textClass = "text-green-400"; 
                                            icon = <div className="w-8 h-8 rounded-full bg-green-500/20 flex items-center justify-center"><i className="fa-solid fa-check text-green-400"></i></div>; 
                                        } 
                                        else if (isNext) { 
                                            bgClass = "bg-fire-900/10 border-fire-500/30"; 
                                            textClass = "text-white"; 
                                            icon = <div className="w-8 h-8 rounded-full bg-fire-500/20 flex items-center justify-center"><i className="fa-solid fa-crosshairs text-fire-500 animate-pulse-fast"></i></div>; 
                                        }
                                        
                                        return (
                                            <div key={tier.id} className={`flex items-center justify-between p-3 sm:p-4 rounded-xl border ${bgClass} transition-all duration-300 hover:bg-white/5`}>
                                                <div className="flex items-center gap-4">
                                                    <div className="w-8 flex justify-center">{icon}</div>
                                                    <div>
                                                        <div className={`font-bold text-sm sm:text-base mb-0.5 ${textClass}`}>{tier.prize}</div>
                                                        <div className="text-[10px] text-gray-500 font-medium uppercase tracking-wider">{tier.allotments} allot + {tier.revReq > 0 ? tier.revText : 'start'}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <p className="text-[10px] text-gray-500 mt-4 text-center uppercase tracking-widest font-bold">*25% paid to qualify</p>
                            </div>
                        </div>
                    </div>

                    {/* PROJECTS */}
                    <div className="mt-8">
                        <div className="card-glass rounded-3xl p-6">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b border-gray-800 pb-4 gap-4">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center">
                                        <i className="fa-solid fa-map-location-dot text-blue-500"></i>
                                    </div>
                                    <h3 className="font-display text-2xl font-bold text-white uppercase">
                                        PROJECTS
                                    </h3>
                                </div>
                                
                                <div className="flex overflow-x-auto hide-scrollbar gap-2 w-full sm:w-auto pb-1">
                                    {FILTER_TABS.map(tab => (
                                        <button key={tab.value} onClick={() => setActiveFilter(tab.value)} className={`px-4 py-2 rounded-full text-xs font-bold uppercase transition-all whitespace-nowrap flex-shrink-0 ${activeFilter === tab.value ? 'bg-fire-600 text-white shadow-[0_0_15px_rgba(227,60,0,0.4)]' : 'bg-gray-800/80 text-gray-400 hover:bg-gray-700 hover:text-white'}`}>
                                            {tab.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
                                {filteredProjects.map(proj => (
                                    <div key={proj.id} className="bg-black/40 border border-gray-800 rounded-2xl p-5 hover:border-gray-500 hover:bg-black/60 transition-all duration-300 relative overflow-hidden flex flex-col justify-between group">
                                        <div>
                                            <div className="inline-block bg-gray-800 text-[9px] font-bold px-2 py-1 rounded mb-3 text-gray-300 uppercase tracking-wider">{proj.category}</div>
                                            <h4 className="font-display font-bold text-lg text-white mb-2 leading-tight group-hover:text-fire-400 transition-colors">{proj.name}</h4>
                                            <p className="text-gray-400 text-sm mb-4 flex items-center gap-2"><i className="fa-solid fa-location-dot text-red-500"></i> {proj.location}</p>
                                        </div>
                                        <div>
                                            <div className="flex justify-between items-end mb-4 pt-4 border-t border-gray-800/50">
                                                <div>
                                                    <div className="text-[10px] text-gray-500 uppercase tracking-wider font-bold mb-1">Starting</div>
                                                    <div className="font-bold text-gold-400 text-xl leading-none">{proj.price}</div>
                                                </div>
                                            </div>
                                            <div className="flex gap-1.5 flex-wrap">
                                                {proj.tags.map((tag, i) => <span key={i} className="bg-gray-800/80 text-gray-300 text-[9px] px-2 py-1 rounded font-medium uppercase tracking-wider">{tag}</span>)}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="text-center text-[10px] text-gray-500 mt-12 mb-4 uppercase tracking-[0.3em] font-bold">
                        <i className="fa-solid fa-fire text-fire-500 mr-2"></i> RISE UP · 90 DAYS · DOMINATE <i className="fa-solid fa-fire text-fire-500 ml-2"></i>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

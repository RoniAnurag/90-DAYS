<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Rise Up 90 – Fire Dashboard</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Oswald', 'sans-serif'] },
                    colors: {
                        fire: { 500: '#ff4e00', 600: '#e33c00', 700: '#c42b00', 800: '#a12200', 900: '#7a1900' },
                        gold: { 400: '#ffd700', 500: '#f5c518' },
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.2s cubic-bezier(0.4,0,0.6,1) infinite',
                        'float': 'float 4s ease-in-out infinite',
                        'float-delayed': 'float 5s ease-in-out infinite 1s',
                        'glow-pulse': 'glowPulse 2s ease-in-out infinite',
                        'fire-rise': 'fireRise 1.8s ease-out infinite',
                        'spin-slow': 'spin 12s linear infinite',
                        'shimmer': 'shimmer 3s linear infinite',
                    },
                    keyframes: {
                        float: { '0%,100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-20px)' } },
                        glowPulse: { '0%,100%': { boxShadow: '0 0 20px rgba(255,78,0,0.2)' }, '50%': { boxShadow: '0 0 60px rgba(255,78,0,0.6)' } },
                        fireRise: { '0%': { transform: 'scale(0.8) translateY(20px)', opacity: '0' }, '50%': { opacity: '1' }, '100%': { transform: 'scale(1.2) translateY(-40px)', opacity: '0' } },
                        shimmer: { '0%': { backgroundPosition: '-200% center' }, '100%': { backgroundPosition: '200% center' } },
                    }
                }
            }
        }
    </script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #050505;
            color: #fff;
            background-image: radial-gradient(ellipse at 50% 0%, #1f0a00 0%, #050505 70%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #111;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff4e00;
            border-radius: 8px;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .text-gradient {
            background: linear-gradient(135deg, #ff4e00, #f5c518, #ff4e00);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }

        .card-glass {
            background: rgba(12, 12, 12, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 78, 0, 0.15);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .card-glass:hover {
            border-color: rgba(255, 78, 0, 0.35);
            box-shadow: 0 8px 50px rgba(255, 78, 0, 0.08);
        }

        /* ——— Floating Fire Particles ——— */
        #fire-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #ff8a00, #ff4e00);
            border-radius: 50%;
            opacity: 0;
            filter: blur(1px);
            animation: fireRise 3s ease-out infinite;
        }

        /* ——— Floating Emojis ——— */
        .float-emoji {
            position: fixed;
            font-size: 2rem;
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
            animation: float 7s ease-in-out infinite;
            user-select: none;
        }

        /* ——— Glow Ring ——— */
        .glow-ring {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 78, 0, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ——— Timer Digit Glow ——— */
        .timer-digit {
            font-family: 'Oswald', sans-serif;
            text-shadow: 0 0 30px rgba(255, 78, 0, 0.3);
        }

        /* ——— Progress Glow ——— */
        .progress-glow {
            position: relative;
            overflow: hidden;
        }
        .progress-glow::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.15), transparent);
            animation: shimmer 3s linear infinite;
        }

        /* ——— Responsive tweaks ——— */
        @media (max-width: 640px) {
            .card-glass {
                backdrop-filter: blur(6px);
                -webkit-backdrop-filter: blur(6px);
            }
            .float-emoji {
                font-size: 1.2rem;
                opacity: 0.06;
            }
            .particle {
                width: 4px;
                height: 4px;
            }
        }

        /* ——— Commission pulse ——— */
        .commission-pulse {
            animation: glowPulse 2.5s ease-in-out infinite;
        }

        /* ——— Card entrance ——— */
        .card-enter {
            animation: cardFadeUp 0.6s ease-out forwards;
            opacity: 0;
        }
        @keyframes cardFadeUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card-enter:nth-child(1) {
            animation-delay: 0.05s;
        }
        .card-enter:nth-child(2) {
            animation-delay: 0.1s;
        }
        .card-enter:nth-child(3) {
            animation-delay: 0.15s;
        }
        .card-enter:nth-child(4) {
            animation-delay: 0.2s;
        }
        .card-enter:nth-child(5) {
            animation-delay: 0.25s;
        }
        .card-enter:nth-child(6) {
            animation-delay: 0.3s;
        }

        /* ——— Entrance overlay (React controlled) ——— */
        #entrance-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
            background-image: radial-gradient(ellipse at 50% 30%, #1f0a00 0%, #050505 70%);
        }
    </style>
</head>
<body>

    <!-- ====== FIRE PARTICLES ====== -->
    <div id="fire-particles"></div>

    <!-- ====== FLOATING EMOJIS ====== -->
    <div class="float-emoji" style="top:8%;left:5%;animation-delay:0s;">🔥</div>
    <div class="float-emoji" style="top:15%;right:8%;animation-delay:1.5s;">⚡</div>
    <div class="float-emoji" style="bottom:20%;left:6%;animation-delay:3s;">🚀</div>
    <div class="float-emoji" style="bottom:12%;right:5%;animation-delay:0.8s;">💪</div>
    <div class="float-emoji" style="top:45%;left:2%;animation-delay:2.2s;">🏆</div>
    <div class="float-emoji" style="top:55%;right:3%;animation-delay:4s;">🔥</div>
    <div class="float-emoji" style="top:30%;left:3%;animation-delay:1s;">✨</div>
    <div class="float-emoji" style="bottom:40%;right:2%;animation-delay:3.5s;">🎯</div>

    <!-- ====== GLOW RINGS ====== -->
    <div class="glow-ring" style="width:60vw;height:60vw;top:-20%;right:-20%;"></div>
    <div class="glow-ring" style="width:50vw;height:50vw;bottom:-15%;left:-15%;"></div>

    <!-- ====== ROOT ====== -->
    <div id="root"></div>

    <!-- ====== REACT ====== -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // ——— DATA ———
        const BONANZA_TIERS = [
            { id: 1, name: "Vietnam Trip", allotments: 2, revReq: 0, revText: "-", prize: "Vietnam Trip (Oct 2nd Wk)" },
            { id: 2, name: "Gold + Vietnam", allotments: 3, revReq: 5000000, revText: "50 Lakhs",
            prize: "8g Gold + Vietnam" },
            { id: 3, name: "China + iPhone", allotments: 5, revReq: 10000000, revText: "1 Crore",
            prize: "China + iPhone 17 Pro Max" },
            { id: 4, name: "Car Down Payment", allotments: 10, revReq: 15000000, revText: "1.5 Crore",
            prize: "China + 4.5L Car DP" },
            { id: 5, name: "House + Car", allotments: 15, revReq: 20000000, revText: "2 Crore",
            prize: "China + 14L House + 4L Car DP" },
            { id: 6, name: "Ultimate Bonanza", allotments: 20, revReq: 25000000, revText: "2.5 Crore",
            prize: "China + 24L House + 5L Car DP" },
        ];

        const PROJECTS = [
            { id: 'p1', region: 'Shadnagar', category: 'Premium / Wellness', name: "Golden Heights Health Village",
                location: "Balanagar", price: "₹19,999", sizes: "150-400 Sq.Yd",
            tags: ["MUDA", "75 Acres", "51+ Amenities"] },
            { id: 'p2', region: 'Shadnagar', category: 'Standard', name: "Iconic 2, 3, 4, 5", location: "Shadnagar",
                price: "₹18,399", sizes: "Var.", tags: ["HMDA/DTCP"] },
            { id: 'p3', region: 'Shadnagar', category: 'Budget', name: "Spring City", location: "Shadnagar",
                price: "₹10,599", sizes: "Var.", tags: ["HMDA/DTCP"] },
            { id: 'p4', region: 'Shadnagar', category: 'Standard', name: "Paradise 2", location: "Shadnagar",
                price: "₹17,399", sizes: "Var.", tags: ["HMDA/DTCP"] },
            { id: 'p5', region: 'Shadnagar', category: 'Premium', name: "Iconic 6 & 7", location: "Bengaluru Hwy",
                price: "₹24,999", sizes: "Var.", tags: ["Highway Facing"] },
            { id: 'p6', region: 'Shadnagar', category: 'Premium', name: "Iconic 9", location: "Burgula", price: "₹19,999",
                sizes: "Var.", tags: ["HMDA"] },
            { id: 'p7', region: 'Shadnagar', category: 'Premium Farm', name: "Dream Valley 2", location: "Kamsanpally",
                price: "₹10.16L", sizes: "Per Gunta", tags: ["Resort Mem.", "Farm Plots"] },
            { id: 'p8', region: 'Shadnagar', category: 'Premium Farm', name: "Dream Valley 3", location: "Nagulapally",
                price: "₹15.48L", sizes: "Per Gunta", tags: ["Resort Mem.", "Farm Plots"] },
            { id: 'p9', region: 'Shadnagar', category: 'Value', name: "Golden Heights @ Rajapur", location: "Rajapur (NH44)",
                price: "Contact", sizes: "Var.", tags: ["MUDA", "Spot Reg."] },
            { id: 'p10', region: 'Mumbai', category: 'Mega Project', name: "Golden Heights Smart County",
                location: "Budhera, Patloor", price: "₹10,499", sizes: "Var.", tags: ["DTCP", "65 Acres", "EMI Avail"] },
            { id: 'p11', region: 'Mumbai', category: 'Mega Project', name: "Golden Heights @ Sadasivapet",
                location: "Sadasivapet", price: "₹10,499", sizes: "Var.", tags: ["DTCP", "Same as Smart County"] },
            { id: 'p12', region: 'Warangal', category: 'Standard', name: "RK Enclave", location: "Ghatkesar",
                price: "₹18,899", sizes: "Var.", tags: ["HMDA", "Near AIIMS"] },
            { id: 'p13', region: 'Warangal', category: 'Value', name: "Rayan Enclave", location: "Bibinagar",
                price: "₹13,399", sizes: "Var.", tags: ["HMDA", "Warangal Hwy"] },
            { id: 'p14', region: 'Warangal', category: 'Value', name: "Aabharana", location: "Yadadri", price: "₹11,499",
                sizes: "110-165 Sq.Yd", tags: ["DTCP", "EMI Available"] },
            { id: 'p15', region: 'Vijayawada', category: 'Premium', name: "Prakriti Hill Township", location: "Piglipur",
                price: "₹22,999", sizes: "Var.", tags: ["Residential"] },
            { id: 'p16', region: 'Vijayawada', category: 'Premium', name: "Medha County", location: "Koheda (East)",
                price: "₹20,999", sizes: "Var.", tags: ["HMDA"] },
        ];

        const FILTER_TABS = [
            { label: "All Projects", value: "All" },
            { label: "Shadnagar (South)", value: "Shadnagar" },
            { label: "Mumbai Hwy (West)", value: "Mumbai" },
            { label: "Warangal Hwy (East)", value: "Warangal" },
            { label: "Vijayawada Hwy (SE)", value: "Vijayawada" },
        ];

        const MOTIVATIONAL_QUOTES = [
            "🔥 Hustle until your haters ask if you're hiring.",
            "⚡ Winners never quit, quitters never win.",
            "🚀 The only limit is your own mind.",
            "💪 Pressure makes diamonds. Stay hard.",
            "🏆 Champions are made in the off-season.",
            "🎯 Focus on your goal, not the noise.",
            "🔥 Be so good they can't ignore you.",
            "⚡ Your future is created by what you do today.",
        ];

        const formatINR = (n) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR',
            maximumFractionDigits: 0 }).format(n);

        // ——— AUDIO HELPER ———
        function createBeatAudio() {
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.value = 70;
                gain.gain.value = 0.06;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();

                let phase = 0;
                const interval = setInterval(() => {
                    if (ctx.state === 'suspended') return;
                    const val = (Math.sin(phase) * 0.5 + 0.5) * 0.08 + 0.02;
                    gain.gain.setTargetAtTime(val, ctx.currentTime, 0.05);
                    phase += 0.6;
                }, 80);

                return { ctx, osc, gain, interval, stop: () => { clearInterval(interval);
                        osc.stop();
                        ctx.close(); } };
            } catch (e) {
                console.warn('Web Audio fallback failed:', e);
                return null;
            }
        }

        // ——— REACT APP ———
        const App = () => {
            const [entered, setEntered] = useState(false);
            const [isMuted, setIsMuted] = useState(false);
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
            const [allotments, setAllotments] = useState(0);
            const [revenueInput, setRevenueInput] = useState("");
            const [activeFilter, setActiveFilter] = useState("All");
            const [quoteIndex, setQuoteIndex] = useState(0);
            const [showConfetti, setShowConfetti] = useState(false);
            const [prevTierId, setPrevTierId] = useState(null);

            const audioRef = useRef(null);
            const audioCtxRef = useRef(null);
            const quoteIntervalRef = useRef(null);
            const timerRef = useRef(null);

            const revenue = parseFloat(revenueInput.replace(/,/g, '')) || 0;
            const commission = revenue * 0.19;

            const currentTier = useMemo(() => {
                let best = null;
                for (const t of BONANZA_TIERS) {
                    if (allotments >= t.allotments && revenue >= t.revReq) best = t;
                }
                return best;
            }, [allotments, revenue]);

            const nextTier = useMemo(() => {
                if (!currentTier) return BONANZA_TIERS[0];
                const idx = BONANZA_TIERS.findIndex(t => t.id === currentTier.id);
                return BONANZA_TIERS[idx + 1] || null;
            }, [currentTier]);

            const filteredProjects = activeFilter === "All" ?
                PROJECTS :
                PROJECTS.filter(p => p.region === activeFilter);

            // ——— Timer ———
            useEffect(() => {
                const target = new Date("September 30, 2026 23:59:59").getTime();
                timerRef.current = setInterval(() => {
                    const now = Date.now();
                    const d = target - now;
                    if (d <= 0) {
                        clearInterval(timerRef.current);
                        setTimeLeft({ days: 0, hours: 0, minutes: 0, seconds: 0 });
                    } else {
                        setTimeLeft({
                            days: Math.floor(d / 86400000),
                            hours: Math.floor((d % 86400000) / 3600000),
                            minutes: Math.floor((d % 3600000) / 60000),
                            seconds: Math.floor((d % 60000) / 1000),
                        });
                    }
                }, 1000);
                return () => clearInterval(timerRef.current);
            }, []);

            // ——— Quote Rotator ———
            useEffect(() => {
                quoteIntervalRef.current = setInterval(() => {
                    setQuoteIndex(i => (i + 1) % MOTIVATIONAL_QUOTES.length);
                }, 5000);
                return () => clearInterval(quoteIntervalRef.current);
            }, []);

            // ——— Confetti on tier unlock ———
            useEffect(() => {
                if (currentTier && currentTier.id !== prevTierId) {
                    setPrevTierId(currentTier.id);
                    setShowConfetti(true);
                    setTimeout(() => setShowConfetti(false), 3000);
                }
            }, [currentTier]);

            // ——— Entrance handler ———
            const handleEnter = () => {
                setEntered(true);

                // Start audio
                try {
                    if (audioRef.current) {
                        audioRef.current.volume = 0.4;
                        audioRef.current.play().catch(() => {
                            if (!audioCtxRef.current) {
                                const beat = createBeatAudio();
                                if (beat) audioCtxRef.current = beat;
                            }
                        });
                    }
                    if (!audioCtxRef.current) {
                        const beat = createBeatAudio();
                        if (beat) audioCtxRef.current = beat;
                    }
                } catch (e) { console.warn('Audio start:', e); }
            };

            // ——— Mute toggle ———
            const toggleMute = () => {
                setIsMuted(!isMuted);
                if (audioRef.current) audioRef.current.muted = !isMuted;
                if (audioCtxRef.current) {
                    if (!isMuted) {
                        audioCtxRef.current.gain.gain.setTargetAtTime(0, audioCtxRef.current.ctx.currentTime, 0.05);
                    } else {
                        audioCtxRef.current.gain.gain.setTargetAtTime(0.06, audioCtxRef.current.ctx.currentTime, 0.05);
                    }
                }
            };

            // ——— Revenue helpers ———
            const handleRevenueChange = (e) => {
                const val = e.target.value.replace(/[^0-9]/g, '');
                setRevenueInput(val);
            };
            const addRevenue = (amount) => {
                setRevenueInput((revenue + amount).toString());
            };

            // ——— Render ———
            if (!entered) {
                return (
                    <div id="entrance-overlay">
                        <div className="text-center z-10 px-4 max-w-2xl">
                            <div className="relative inline-block mb-6">
                                <i className="fa-solid fa-fire-flame-curved text-7xl md:text-8xl text-fire-500 animate-pulse-fast"></i>
                                <div className="absolute -inset-4 rounded-full bg-fire-500/10 blur-2xl animate-pulse"></div>
                            </div>
                            <h1 className="font-display text-4xl sm:text-5xl md:text-7xl font-black uppercase text-gradient leading-tight drop-shadow-lg">
                                Rise Up 90
                            </h1>
                            <p className="text-gray-400 text-sm sm:text-lg mt-2 md:mt-4 uppercase tracking-[0.2em] font-semibold">
                                The Challenge Starts Now.
                            </p>
                            <button
                                onClick={handleEnter}
                                className="mt-8 md:mt-10 bg-gradient-to-r from-fire-600 to-fire-500 hover:from-fire-500 hover:to-gold-500 text-white font-display font-black text-lg sm:text-xl md:text-2xl py-4 px-10 md:py-5 md:px-14 rounded-full shadow-[0_0_40px_rgba(255,78,0,0.4)] hover:shadow-[0_0_60px_rgba(255,215,0,0.5)] transform hover:scale-105 transition-all duration-300 uppercase tracking-wider w-full sm:w-auto active:scale-95 touch-manipulation"
                            >
                                <i className="fa-solid fa-bolt mr-2"></i> Ignite
                                <i className="fa-solid fa-arrow-right ml-2"></i>
                            </button>
                            <p className="text-[10px] text-gray-600 mt-6 font-bold tracking-widest uppercase">
                                <i className="fa-solid fa-headphones mr-1"></i> Audio experience · Tap to start
                            </p>
                        </div>
                    </div>
                );
            }

            // ——— MAIN DASHBOARD ———
            return (
                <div className="min-h-screen p-3 sm:p-4 md:p-8 font-sans pb-28 relative z-10">

                    {/* Audio Element */}
                    <audio ref={audioRef} src="Passo.mp3" loop preload="auto" />

                    {/* Audio Control */}
                    <button onClick={toggleMute}
                    className="fixed top-3 right-3 sm:top-4 sm:right-4 md:top-6 md:right-6 z-50 card-glass p-2.5 sm:p-3 rounded-full text-white hover:text-fire-500 border border-gray-700 transition-all shadow-lg backdrop-blur-md hover:border-fire-500/50">
                    {isMuted ?
                        <i className="fa-solid fa-volume-xmark text-base sm:text-lg w-5 text-center text-gray-500"></i> :
                        <i className="fa-solid fa-volume-high text-base sm:text-lg w-5 text-center text-fire-500 animate-pulse-fast"></i>}
                </button>

                {/* ——— HEADER ——— */}
                <div className="text-center mb-6 sm:mb-8 md:mb-10 mt-10 sm:mt-12 md:mt-0 px-2">
                    <h1 className="font-display text-3xl sm:text-4xl md:text-6xl lg:text-7xl font-black uppercase text-gradient leading-tight tracking-tight drop-shadow-[0_0_30px_rgba(255,78,0,0.15)]">
                        Rise Up 90
                    </h1>
                    <div className="mt-2 max-w-2xl mx-auto">
                        <p className="text-gray-400 text-xs sm:text-sm md:text-lg font-semibold tracking-widest uppercase opacity-80">
                            <i className="fa-solid fa-quote-left text-fire-500 mr-1 opacity-50"></i>
                            {MOTIVATIONAL_QUOTES[quoteIndex]}
                            <i className="fa-solid fa-quote-right text-fire-500 ml-1 opacity-50"></i>
                        </p>
                    </div>
                </div>

                {/* ——— TIMER ——— */}
                <div className="flex justify-center gap-1.5 sm:gap-3 md:gap-5 mb-8 md:mb-10">
                    {[
                        { label: 'Days', value: timeLeft.days },
                        { label: 'Hrs', value: timeLeft.hours },
                        { label: 'Min', value: timeLeft.minutes },
                        { label: 'Sec', value: timeLeft.seconds }
                    ].map((t, i) => (
                        <div key={i}
                        className="card-glass rounded-xl p-2 sm:p-3 md:p-5 w-14 sm:w-20 md:w-28 lg:w-32 flex flex-col items-center justify-center border-t-2 border-t-fire-500 shadow-[0_0_20px_rgba(255,78,0,0.05)]">
                        <span className="font-display text-2xl sm:text-3xl md:text-4xl lg:text-5xl font-bold text-white timer-digit">
                            {String(t.value).padStart(2, '0')}
                        </span>
                        <span className="text-[8px] sm:text-[10px] md:text-xs text-gray-400 uppercase font-bold tracking-widest">{t.label}</span>
                    </div>
                ))}
            </div>

            {/* ——— MAIN GRID ——— */}
            <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-4 sm:gap-6 md:gap-8">

                {/* LEFT COLUMN */}
                <div className="lg:col-span-5 flex flex-col gap-4 sm:gap-6">

                    {/* Commission */}
                    <div className="card-glass rounded-2xl p-4 sm:p-6 relative overflow-hidden group card-enter border-l-4 border-l-green-500">
                        <div className="absolute inset-0 bg-gradient-to-r from-green-900/20 to-emerald-900/10 opacity-60"></div>
                        <div className="relative z-10 text-center">
                            <h2 className="text-gray-400 uppercase tracking-[0.15em] text-[10px] sm:text-xs font-bold mb-1">
                                <i className="fa-solid fa-money-bill-wave text-green-400 mr-1.5"></i> Your 19% Commission
                            </h2>
                            <div className="font-display text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-black text-green-400 commission-pulse break-words drop-shadow-[0_0_20px_rgba(74,222,128,0.3)]">
                                {formatINR(commission)}
                            </div>
                            {commission > 0 && (
                                <div className="mt-1.5 text-green-300 text-[10px] sm:text-xs font-bold animate-pulse uppercase tracking-wider">
                                    ⚡ Pure Profit — Keep Crushing!
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Inputs */}
                    <div className="card-glass rounded-2xl p-4 sm:p-6 border-l-4 border-l-fire-500 card-enter">
                        <h3 className="font-display text-xl sm:text-2xl font-bold mb-4 sm:mb-5 text-white uppercase border-b border-gray-800 pb-2 flex items-center gap-2">
                            <i className="fa-solid fa-sliders text-fire-500"></i> Log Progress
                        </h3>

                        <div className="mb-4 sm:mb-5">
                            <label className="block text-gray-400 text-[10px] sm:text-xs font-bold mb-1.5 uppercase tracking-wider">
                                <i className="fa-solid fa-building mr-1"></i> Allotments / Bookings
                            </label>
                            <div className="flex items-center">
                                <button onClick={() => setAllotments(Math.max(0, allotments - 1))}
                                className="bg-gray-800 hover:bg-gray-700 text-white p-3 sm:p-4 rounded-l-xl transition active:scale-95 touch-manipulation">
                                <i className="fa-solid fa-minus text-sm sm:text-base"></i>
                            </button>
                            <input type="number" value={allotments}
                            onChange={(e) => setAllotments(parseInt(e.target.value) || 0)}
                            className="w-full bg-black border-y border-gray-700 text-center text-2xl sm:text-3xl font-display font-bold text-white py-2 sm:py-2.5 focus:outline-none focus:border-fire-500 transition" />
                            <button onClick={() => setAllotments(allotments + 1)}
                            className="bg-fire-600 hover:bg-fire-500 text-white p-3 sm:p-4 rounded-r-xl transition active:scale-95 touch-manipulation">
                            <i className="fa-solid fa-plus text-sm sm:text-base"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label className="block text-gray-400 text-[10px] sm:text-xs font-bold mb-1.5 uppercase tracking-wider">
                        <i className="fa-solid fa-indian-rupee-sign mr-1"></i> Total Plot Value Sold
                    </label>
                    <input type="text" value={revenueInput} onChange={handleRevenueChange}
                    placeholder="Enter amount …"
                    className="w-full bg-black border border-gray-700 rounded-xl text-xl sm:text-2xl font-display font-bold text-white p-3 sm:p-4 focus:outline-none focus:border-fire-500 transition mb-3" />
                    <div className="flex flex-wrap gap-1.5 sm:gap-2">
                        <button onClick={() => addRevenue(1000000)}
                        className="text-[10px] sm:text-xs bg-gray-800 hover:bg-gray-700 px-2.5 sm:px-3 py-1.5 rounded-lg text-gray-300 transition flex-1 text-center whitespace-nowrap active:scale-95">
                        +1 Lakh
                    </button>
                    <button onClick={() => addRevenue(5000000)}
                    className="text-[10px] sm:text-xs bg-gray-800 hover:bg-gray-700 px-2.5 sm:px-3 py-1.5 rounded-lg text-gray-300 transition flex-1 text-center whitespace-nowrap active:scale-95">
                    +5 Lakhs
                </button>
                <button onClick={() => addRevenue(10000000)}
                className="text-[10px] sm:text-xs bg-gray-800 hover:bg-gray-700 px-2.5 sm:px-3 py-1.5 rounded-lg text-gold-400 transition flex-1 text-center whitespace-nowrap active:scale-95">
                +10 Lakhs
            </button>
            <button onClick={() => setRevenueInput("")}
            className="text-[10px] sm:text-xs bg-red-900/40 hover:bg-red-900/60 px-2.5 sm:px-3 py-1.5 rounded-lg text-red-300 transition active:scale-95">
            Reset
        </button>
    </div>
    <div className="mt-2 text-right text-xs sm:text-sm text-gray-400 font-medium">
        Value: <span className="text-white font-bold">{formatINR(revenue)}</span>
    </div>
</div>
</div>
</div>

{/* RIGHT COLUMN */}
<div className="lg:col-span-7 flex flex-col gap-4 sm:gap-6">

    {/* Bonanza Status */}
    <div className="card-glass rounded-2xl p-4 sm:p-6 card-enter">
        <div className="flex justify-between items-center mb-4 sm:mb-5 border-b border-gray-800 pb-2">
            <h3 className="font-display text-xl sm:text-2xl font-bold text-white uppercase flex items-center gap-2">
                <i className="fa-solid fa-trophy text-gold-400"></i> Bonanza
            </h3>
            {currentTier && (
                <span className="bg-green-900/40 text-green-400 text-[10px] sm:text-xs font-bold px-3 py-1 rounded-full border border-green-500/30 animate-pulse-fast">
                    <i className="fa-solid fa-check-circle mr-1"></i> Unlocked
                </span>
            )}
        </div>

        {/* Current Reward */}
        {currentTier ? (
            <div className="bg-gradient-to-r from-fire-600/30 to-gold-500/20 rounded-xl p-4 mb-5 text-center border border-fire-500/30 transform hover:scale-[1.01] transition shadow-[0_0_30px_rgba(255,78,0,0.1)]">
                <p className="text-[10px] sm:text-xs font-bold uppercase tracking-wider mb-0.5 text-white/60">
                    <i className="fa-solid fa-gem mr-1 text-gold-400"></i> Reward Unlocked
                </p>
                <h4 className="font-display text-xl sm:text-2xl md:text-3xl font-black text-white drop-shadow-[0_0_15px_rgba(255,215,0,0.2)]">
                    {currentTier.prize}
                </h4>
            </div>
        ) : (
            <div className="bg-gray-800/30 rounded-xl p-4 mb-5 text-center border border-gray-700">
                <p className="text-[10px] sm:text-xs font-bold uppercase tracking-wider text-gray-400">
                    No Rewards Yet
                </p>
                <h4 className="font-display text-lg sm:text-xl font-bold text-gray-300">Start Booking to Unlock</h4>
            </div>
        )}

        {/* Next Target */}
        {nextTier && (
            <div className="mb-5">
                <h4 className="text-gray-400 font-bold uppercase text-[10px] sm:text-xs mb-2.5 tracking-wider">
                    <i className="fa-solid fa-crosshairs text-fire-500 mr-1.5"></i> Next Target: <span className="text-white">{nextTier.name}</span>
                </h4>
                <div className="grid grid-cols-2 gap-3">
                    <div className="bg-black/40 p-3 rounded-xl border border-gray-700 text-center">
                        <p className="text-[9px] sm:text-[10px] text-gray-500 uppercase tracking-wider">Allotments</p>
                        <p className={`font-display font-bold text-lg sm:text-xl ${allotments >= nextTier.allotments ? 'text-green-400' : 'text-white'}`}>
                            {allotments} / {nextTier.allotments}
                        </p>
                        {allotments >= nextTier.allotments && (
                            <p className="text-green-400 text-[10px] font-bold"><i className="fa-solid fa-check mr-0.5"></i> Done</p>
                        )}
                    </div>
                    <div className="bg-black/40 p-3 rounded-xl border border-gray-700 text-center">
                        <p className="text-[9px] sm:text-[10px] text-gray-500 uppercase tracking-wider">Revenue Req</p>
                        <p className={`font-display font-bold text-lg sm:text-xl ${revenue >= nextTier.revReq ? 'text-green-400' : 'text-white'}`}>
                            {revenue >= nextTier.revReq ? "✅ Cleared" : (nextTier.revText || "—")}
                        </p>
                    </div>
                </div>
            </div>
        )}

        {/* All Tiers */}
        <div className="space-y-2.5 max-h-[260px] sm:max-h-[300px] overflow-y-auto pr-1.5">
            {BONANZA_TIERS.map((tier) => {
                const unlocked = currentTier && tier.id <= currentTier.id;
                const isNext = nextTier && tier.id === nextTier.id;
                let bg = "bg-black/30 border-gray-800";
                let txt = "text-gray-400";
                let icon = <i className="fa-solid fa-lock text-gray-600 text-xs sm:text-sm"></i>;
                if (unlocked) {
                    bg = "bg-green-900/20 border-green-500/30 shadow-[0_0_12px_rgba(74,222,128,0.05)]";
                    txt = "text-green-400";
                    icon = <i className="fa-solid fa-check-circle text-green-400 text-xs sm:text-sm"></i>;
                } else if (isNext) {
                    bg = "bg-fire-900/20 border-fire-500/50 shadow-[0_0_20px_rgba(255,78,0,0.08)]";
                    txt = "text-white";
                    icon = <i className="fa-solid fa-crosshairs text-fire-500 animate-pulse-fast text-xs sm:text-sm"></i>;
                }
                return (
                    <div key={tier.id} className={`flex items-center justify-between p-2.5 sm:p-3 rounded-xl border ${bg} transition-all`}>
                        <div className="flex items-center gap-3 sm:gap-4 min-w-0">
                            <div className="w-5 sm:w-6 text-center flex-shrink-0">{icon}</div>
                            <div className="min-w-0">
                                <div className={`font-bold text-sm sm:text-base truncate ${txt}`}>{tier.prize}</div>
                                <div className="text-[9px] sm:text-[10px] text-gray-500">Req: {tier.allotments} allotments {tier.revReq > 0 ? `+ ${tier.revText}` : ''}</div>
                            </div>
                        </div>
                    </div>
                );
            })}
            <p className="text-[9px] sm:text-[10px] text-gray-500 mt-2 text-center">* 25% of plot value paid to qualify</p>
        </div>
    </div>
</div>
</div>

{/* ——— PROJECT CHEAT SHEET ——— */}
<div className="max-w-7xl mx-auto mt-6 sm:mt-8">
    <div className="card-glass rounded-2xl p-4 sm:p-6 card-enter">
        <h3 className="font-display text-lg sm:text-xl md:text-2xl font-bold mb-4 sm:mb-5 text-white uppercase border-b border-gray-800 pb-2 flex items-center gap-2">
            <i className="fa-solid fa-map-location-dot text-fire-500"></i> Project Cheat Sheet
        </h3>

        {/* Filter Tabs */}
        <div className="flex overflow-x-auto hide-scrollbar gap-1.5 sm:gap-2 mb-5 pb-2 -mx-2 px-2 sm:mx-0 sm:px-0">
            {FILTER_TABS.map(tab => (
                <button key={tab.value} onClick={() => setActiveFilter(tab.value)}
                className={`px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-[9px] sm:text-xs font-bold uppercase transition-all whitespace-nowrap flex-shrink-0 touch-manipulation ${
                    activeFilter === tab.value ?
                    'bg-fire-600 text-white shadow-[0_0_15px_rgba(227,60,0,0.4)]' :
                    'bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white'
                }`}>
                {tab.label}
            </button>
        ))}
    </div>

    {/* Projects Grid */}
    <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3 sm:gap-4">
        {filteredProjects.map((proj, idx) => (
            <div key={proj.id}
            className="bg-black/50 border border-gray-800 rounded-xl p-3 sm:p-4 hover:border-gray-600 transition group relative overflow-hidden flex flex-col justify-between hover:shadow-[0_0_25px_rgba(255,78,0,0.04)]"
            style={{ animationDelay: `${idx * 0.04}s` }}>
            <div>
                <div className="absolute top-0 right-0 bg-gray-800/80 text-[8px] sm:text-[10px] font-bold px-2 py-0.5 sm:py-1 rounded-bl-xl text-gray-300 uppercase tracking-wider">
                    {proj.category}
                </div>
                <h4 className="font-display font-bold text-sm sm:text-base text-white mb-0.5 pr-14 leading-tight">{proj.name}</h4>
                <p className="text-gray-400 text-xs sm:text-sm mb-2.5"><i className="fa-solid fa-location-dot text-red-500 mr-1 text-[10px]"></i> {proj.location}</p>
            </div>
            <div className="flex flex-col sm:flex-row justify-between sm:items-end gap-2 sm:gap-0 mt-auto">
                <div>
                    <div className="text-[8px] sm:text-[10px] text-gray-500 uppercase tracking-wider">Starting at</div>
                    <div className="font-bold text-gold-400 text-base sm:text-lg leading-none">{proj.price} <span className="text-[8px] sm:text-[10px] font-normal text-gray-400">{proj.sizes && proj.sizes.includes('Gunta') ? '' : '/ sq.yd'}</span></div>
                </div>
                <div className="flex gap-1 flex-wrap justify-start sm:justify-end">
                    {proj.tags.map((tag, i) => (
                        <span key={i} className="bg-gray-800/80 text-gray-300 text-[7px] sm:text-[10px] px-1.5 sm:px-2 py-0.5 sm:py-1 rounded whitespace-nowrap">{tag}</span>
                    ))}
                </div>
            </div>
        </div>
    ))}
</div>
</div>
</div>

{/* ——— FOOTER ——— */}
<div className="max-w-7xl mx-auto mt-6 sm:mt-8 text-center text-[9px] sm:text-xs text-gray-600 border-t border-gray-800/50 pt-4 sm:pt-6">
    <p className="tracking-widest uppercase">
        <i className="fa-solid fa-fire text-fire-500/50 mr-1"></i>
        Rise Up 90 — Dominate. Crush. Win.
        <i className="fa-solid fa-fire text-fire-500/50 ml-1"></i>
    </p>
</div>
</div>
);
};

// ——— Generate fire particles ———
document.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById('fire-particles');
    if (container) {
        for (let i = 0; i < 45; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 3 + Math.random() * 6;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDuration = 2.5 + Math.random() * 3 + 's';
            p.style.animationDelay = Math.random() * 4 + 's';
            p.style.opacity = 0.2 + Math.random() * 0.4;
            container.appendChild(p);
        }
    }
});

// ——— RENDER REACT ———
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
